        setVisited(prev => {
            const next = [...prev];
            next[module] = true;
            return next;
        });
        if(contentRef.current) {
            contentRef.current.scrollTop = 0;
        }
    }, [module]);

    const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');
    const toggleLang = () => setLang(lang === 'zh' ? 'en' : 'zh');

    // Content Renderers
    const renderIntro = () => (
        <div className="animate-fade-in space-y-8">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="bg-white dark:bg-slate-800 p-6 sm:p-10 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8 transform transition hover:scale-[1.02]">
                <div className="text-center p-4 bg-blue-50 dark:bg-blue-900/30 rounded-xl border border-blue-100 dark:border-blue-800 w-full md:w-auto">
                    <div className="font-bold text-2xl text-blue-700 dark:text-blue-400">{m.equation.left}</div>
                </div>
                <div className="text-3xl font-black text-slate-400 dark:text-slate-500">{m.equation.equals}</div>
                <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                    <div className="text-center p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl border border-emerald-100 dark:border-emerald-800 flex-1">
                        <div className="font-bold text-xl text-emerald-700 dark:text-emerald-400">{m.equation.right1}</div>
                        <div className="text-sm text-emerald-600 dark:text-emerald-500 mt-1">{m.equation.right1_sub}</div>
                    </div>
                    <div className="text-3xl font-black text-slate-400 dark:text-slate-500 self-center">+</div>
                    <div className="text-center p-4 bg-amber-50 dark:bg-amber-900/30 rounded-xl border border-amber-100 dark:border-amber-800 flex-1">
                        <div className="font-bold text-xl text-amber-700 dark:text-amber-400">{m.equation.right2}</div>
                        <div className="text-sm text-amber-600 dark:text-amber-500 mt-1">{m.equation.right2_sub}</div>
                    </div>
                </div>
            </div>
            <div className="grid md:grid-cols-2 gap-6">
                {m.points.map((pt, idx) => (
                    <div key={idx} className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-brand-dark dark:border-brand-gold shadow-sm">
                        <h3 className="font-bold text-lg mb-3 dark:text-white">{pt.title}</h3>
                        <p className="text-slate-600 dark:text-slate-400">{pt.text}</p>
                    </div>
                ))}
            </div>
        </div>
    );

    const renderDecision = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="overflow-x-auto rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <table className="w-full text-left border-collapse bg-white dark:bg-slate-800">
                    <thead>
                        <tr className="bg-slate-100 dark:bg-slate-900">
                            {m.table.headers.map((h, i) => (
                                <th key={i} className="p-4 font-semibold text-slate-700 dark:text-slate-300 border-b dark:border-slate-700">{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {m.table.rows.map((r, i) => (
                            <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b dark:border-slate-700 last:border-0 group">
                                <td className="p-4 font-medium text-brand-dark dark:text-brand-gold">{r.level}</td>
                                <td className="p-4 font-bold">{r.role}</td>
                                <td className="p-4 italic text-slate-600 dark:text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{r.question}</td>
                                <td className="p-4 text-slate-600 dark:text-slate-400">{r.scope}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );

    const renderConflict = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="grid md:grid-cols-2 gap-8 perspective">
                {m.cards.map((card, idx) => (
                    <div key={idx} className="flip-card h-64 group cursor-pointer relative">
                        <div className="flip-card-inner relative w-full h-full shadow-md rounded-2xl">
                            <div className="absolute w-full h-full backface-hidden bg-white dark:bg-slate-800 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-600 flex flex-col items-center justify-center p-6 text-center">
                                <div className="text-4xl mb-4">{idx === 0 ? '👔' : '💻'}</div>
                                <h3 className="text-xl font-bold text-slate-700 dark:text-slate-200">{card.front}</h3>
                                <p className="mt-4 text-sm text-slate-500 dark:text-slate-400 animate-pulse">{lang === 'zh' ? '點擊翻轉查看防守者' : 'Click to reveal defender'}</p>
                            </div>
                            <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-brand-dark dark:bg-slate-900 rounded-2xl border border-brand-gold flex flex-col items-center justify-center p-8 text-center text-white">
                                <h3 className="text-2xl font-black text-brand-gold mb-3">{card.back}</h3>
                                <p className="text-brand-light/90 leading-relaxed">{card.backDesc}</p>
                            </div>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );

    const renderMatrix = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="relative border-l-2 border-brand-dark/20 dark:border-brand-gold/20 ml-4 md:ml-8 space-y-8 py-4">
                {m.nodes.map((node, idx) => (
                    <div key={idx} className="relative pl-8">
                        <div className="absolute -left-[11px] top-1 h-5 w-5 rounded-full bg-brand-dark dark:bg-brand-gold border-4 border-white dark:border-slate-900"></div>
                        <div className="bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-shadow">
                            <h3 className="font-bold text-lg text-brand-dark dark:text-brand-gold mb-2">{node.title}</h3>
                            <p className="text-slate-600 dark:text-slate-400">{node.desc}</p>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );

    const renderDriver = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="grid md:grid-cols-2 gap-6">
                {m.comparisons.map((comp, idx) => (
                    <div key={idx} className="group relative bg-white dark:bg-slate-800 rounded-2xl p-8 overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-slate-50 dark:bg-slate-700/30 rounded-bl-full -z-10 group-hover:scale-110 transition-transform duration-500"></div>
                        <h3 className="text-2xl font-bold mb-2 dark:text-white">{comp.type}</h3>
                        <div className="inline-block px-4 py-1 rounded-full text-sm font-semibold mb-6 bg-brand-dark text-brand-gold dark:bg-brand-gold dark:text-brand-dark">
                            {comp.focus}
                        </div>
                        <p className="text-slate-600 dark:text-slate-400 leading-relaxed">{comp.detail}</p>
                    </div>
                ))}
            </div>
        </div>
    );

    const renderConclusion = () => (
        <div className="animate-fade-in flex flex-col items-center justify-center min-h-[50vh] text-center space-y-8">
            <div className="w-20 h-20 bg-brand-dark dark:bg-brand-gold rounded-full flex items-center justify-center shadow-lg">
                <Icon name="checkCircle" size={40} className="text-brand-gold dark:text-brand-dark" />
            </div>
            <h2 className="text-3xl md:text-4xl font-bold text-slate-800 dark:text-white">{m.title}</h2>
            <p className="text-lg text-slate-500 dark:text-slate-400 max-w-2xl">{m.desc}</p>
            <blockquote className="relative p-8 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 max-w-3xl">
                <div className="absolute top-4 left-4 text-6xl text-slate-200 dark:text-slate-700 font-serif leading-none">"</div>
                <p className="relative z-10 text-xl md:text-2xl font-serif leading-relaxed text-brand-dark dark:text-brand-gold italic">
                    {m.quote}
                </p>
                <div className="absolute bottom-[-10px] right-4 text-6xl text-slate-200 dark:text-slate-700 font-serif leading-none rotate-180">"</div>
            </blockquote>
        </div>
    );

    // Module 7: Interactive Lab Component
    const InteractiveLab = () => {
        const [selected, setSelected] = useState(null);
        return (
            <div className="animate-fade-in space-y-6">
                <p className="text-lg text-slate-600 dark:text-slate-300 font-medium">{m.desc}</p>
                <div className="bg-brand-dark/5 dark:bg-slate-800/50 p-6 sm:p-8 rounded-2xl border border-brand-dark/10 dark:border-slate-700">
                    <h3 className="text-xl font-bold text-brand-dark dark:text-brand-gold mb-6 leading-relaxed">
                        {m.quiz.question}
                    </h3>
                    <div className="grid gap-4">
                        {m.quiz.options.map((opt, i) => (
                            <button
                                key={i}
                                onClick={() => setSelected(i)}
                                className={`p-5 text-left rounded-xl border-2 transition-all duration-300 shadow-sm ${
                                    selected === i 
                                    ? (opt.correct 
                                        ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30' 
                                        : 'border-rose-500 bg-rose-50 dark:bg-rose-900/30') 
                                    : 'border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 hover:border-brand-gold hover:shadow-md'
                                }`}
                            >
                                <div className="font-bold text-slate-800 dark:text-slate-200 flex items-center justify-between">
                                    {opt.title}
                                    {selected === i && (
                                        <Icon name={opt.correct ? "checkCircle" : "x"} className={opt.correct ? "text-emerald-500" : "text-rose-500"} />
                                    )}
                                </div>
                                {selected === i && (
                                    <div className={`text-sm mt-3 pt-3 border-t ${opt.correct ? 'border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300' : 'border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-300'} animate-fade-in`}>
                                        {opt.feedback}
                                    </div>
                                )}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // Module 8: External Resources
    const ExternalResources = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <ul className="grid gap-4 md:grid-cols-2">
                {m.links.map((link, i) => (
                    <li key={i}>
                        <a href={link.url} target="_blank" rel="noreferrer" className="flex items-start p-5 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:shadow-md hover:border-brand-gold/50 transition-all group h-full">
                            <div className="mt-1 bg-brand-light dark:bg-slate-700 p-2 rounded-lg group-hover:bg-brand-gold/20 transition-colors">
                                <Icon name="link" className="text-brand-dark dark:text-brand-gold" size={24} />
                            </div>
                            <div className="ml-4 flex-1">
                                <h4 className="font-bold text-lg text-slate-800 dark:text-slate-200 group-hover:text-brand-dark dark:group-hover:text-brand-gold transition-colors">{link.title}</h4>
                                <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{link.desc}</p>
                            </div>
                        </a>
                    </li>
                ))}
            </ul>
        </div>
    );

    // Module 9: Learning Journey
    const LearningJourney = () => {
        const completedCount = visited.filter(v => v).length;
        const progress = Math.round((completedCount / TOTAL_MODULES) * 100);
        return (
            <div className="animate-fade-in space-y-6">
                <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
                <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <div className="flex justify-between items-end mb-3">
                        <span className="font-bold text-slate-700 dark:text-slate-300 text-lg">{m.progressTitle}</span>
                        <span className="font-black text-3xl text-brand-dark dark:text-brand-gold">{progress}%</span>
                    </div>
                    <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 mb-8 overflow-hidden border border-slate-200 dark:border-slate-600">
                        <div className="bg-brand-dark dark:bg-brand-gold h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div>
                    </div>
                    <div className="grid gap-3 sm:grid-cols-2 md:grid-cols-3">
                        {t.nav.map((n, i) => (
                            <button 
                                key={i}
                                onClick={() => setModule(i)}
                                className={`flex items-center p-3 rounded-lg border text-left transition-colors ${
                                    visited[i] 
                                    ? 'border-emerald-200 bg-emerald-50 dark:bg-emerald-900/20 dark:border-emerald-800' 
                                    : 'border-slate-100 bg-slate-50 dark:bg-slate-800/50 dark:border-slate-700'
                                }`}
                            >
                                <Icon name={visited[i] ? "checkCircle" : "circle"} className={`shrink-0 mr-3 ${visited[i] ? 'text-emerald-500' : 'text-slate-300 dark:text-slate-600'}`} size={20} />
                                <span className={`text-sm font-medium truncate ${visited[i] ? 'text-slate-800 dark:text-slate-200' : 'text-slate-400 dark:text-slate-500'}`}>{n.title}</span>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const renderContent = () => {
        switch(module) {
            case 0: return renderIntro();
            case 1: return renderDecision();
            case 2: return renderConflict();
            case 3: return renderMatrix();
            case 4: return renderDriver();
            case 5: return renderConclusion();
            case 6: return <InteractiveLab />;
            case 7: return <ExternalResources />;
            case 8: return <LearningJourney />;
            default: return renderIntro();
        }
    };

    return (
        <div className="h-screen flex flex-col font-sans">
            {/* Header (Matching Reference App) */}
            <header className="shrink-0 bg-brand-dark border-b border-brand-gold shadow-md">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex items-center">
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden p-2 rounded-md text-brand-gold hover:bg-white/10 mr-2 focus:outline-none">
                                <Icon name={isMobileMenuOpen ? "x" : "menu"} size={24} />
                            </button>
                            <span className="font-serif font-bold text-xl text-brand-gold tracking-wider truncate mr-4">{t.brand}</span>
                        </div>
                        <div className="flex items-center space-x-2 md:space-x-4 shrink-0">
                            <button onClick={toggleLang} className="flex items-center px-3 py-1.5 rounded-full bg-white/10 text-brand-gold hover:bg-white/20 transition-colors text-sm font-medium border border-brand-gold/30">
                                <Icon name="globe" size={16} className="mr-2" />
                                {lang === 'zh' ? 'EN' : '中文'}
                            </button>
                            <button onClick={toggleTheme} className="p-2 rounded-full text-brand-gold hover:bg-white/10 transition-colors border border-transparent hover:border-brand-gold/30">
                                <Icon name={theme === 'dark' ? "sun" : "moon"} size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            {/* Page Title Banner */}
            <div className="shrink-0 bg-brand-light dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
                    <h1 className="text-2xl md:text-3xl lg:text-4xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">{t.docTitle}</h1>
                    <p className="text-base md:text-lg text-slate-600 dark:text-slate-400 flex items-center gap-2">
                        <Icon name="layers" size={20} className="text-brand-dark dark:text-brand-gold opacity-70" />
                        {t.subtitle}
                    </p>
                </div>
            </div>

            {/* Main App Layout */}
            <div className="flex-1 flex overflow-hidden max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 md:py-6 gap-6">
                
                {/* Sidebar Navigation */}
                <aside className={`md:w-72 flex-shrink-0 absolute md:relative z-30 h-full transition-transform transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-[150%] md:translate-x-0'} left-0 top-0 pt-2 md:pt-0 pl-4 md:pl-0`}>
                    <div className="h-full bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-y-auto w-64 md:w-full">
                        <nav className="p-3 space-y-1">
                            {t.nav.map((item, idx) => {
                                const isActive = module === idx;
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => { setModule(idx); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 ${
                                            isActive 
                                            ? 'bg-brand-dark text-brand-gold dark:bg-brand-gold dark:text-brand-dark shadow-md' 
                                            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-brand-dark dark:hover:text-white'
                                        }`}
                                    >
                                        <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                        <span className="truncate">{item.title}</span>
                                        {isActive && <Icon name="chevronRight" size={16} className="ml-auto opacity-70 shrink-0" />}
                                    </button>
                                );
                            })}
                        </nav>
                    </div>
                </aside>

                {/* Content Area */}
                <main ref={contentRef} className="flex-1 overflow-y-auto rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 relative scroll-smooth" onClick={() => isMobileMenuOpen && setIsMobileMenuOpen(false)}>
                    <div className="p-5 sm:p-8 md:p-10 min-h-full flex flex-col">
                        <div className="flex-1">
                            <h2 className="text-2xl md:text-3xl font-bold mb-8 text-slate-800 dark:text-white border-b-2 border-brand-gold inline-block pb-2">{m.title}</h2>
                            {renderContent()}
                        </div>
                        
                        {/* Footer Navigation (Next/Prev Buttons) - Matching Reference */}
                        <div className="mt-12 pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-between shrink-0">
                            <button 
                                onClick={() => setModule(Math.max(0, module - 1))} 
                                disabled={module === 0} 
                                className="px-4 sm:px-6 py-2.5 sm:py-3 text-slate-600 dark:text-brand-gold border border-slate-200 dark:border-brand-gold/30 hover:bg-slate-50 dark:hover:bg-brand-gold/10 rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider flex items-center transition-colors"
                            >
                                ← {t.nav_prev}
                            </button>
                            <button 
                                onClick={() => setModule(Math.min(TOTAL_MODULES - 1, module + 1))} 
                                disabled={module === TOTAL_MODULES - 1} 
                                className="px-5 sm:px-8 py-2.5 sm:py-3 bg-brand-dark dark:bg-brand-gold text-white dark:text-brand-dark font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider shadow-md flex items-center transition-colors"
                            >
                                {t.nav_next} <Icon name="arrowRight" size={16} className="ml-2"/>
                            </button>
                        </div>
                    </div>
                </main>
            </div>

            {/* Application Footer (Matching Reference Architecture) */}
            <footer className="h-8 bg-brand-dark flex items-center justify-between px-4 shrink-0 shadow-inner">
                <span className="text-brand-gold/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
                <span className="text-brand-gold/60 text-[10px] sm:text-xs flex items-center gap-3">
                    <span className="flex items-center gap-1">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-brand-gold hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
                </span>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
