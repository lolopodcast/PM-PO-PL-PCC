// --- Main App Component ---
const App = () => {
    const [lang, setLang] = useState('zh');
    const [theme, setTheme] = useState('light');
    const [module, setModule] = useState(0); 
    const [visited, setVisited] = useState(Array(TOTAL_MODULES).fill(false));
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
    const [isPlaying, setIsPlaying] = useState(false);
    
    const contentRef = useRef(null);
    const menuRef = useRef(null);

    const t = contentData[lang];
    const m = t.modules[module];

    // Theme initialization
    useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [theme]);

    // Handle outside click for mobile menu
    useEffect(() => {
        const handleClickOutside = (event) => {
            if (menuRef.current && !menuRef.current.contains(event.target)) {
                setIsMobileMenuOpen(false);
            }
        };
        if (isMobileMenuOpen) {
            document.addEventListener("mousedown", handleClickOutside);
        }
        return () => {
            document.removeEventListener("mousedown", handleClickOutside);
        };
    }, [isMobileMenuOpen]);

    // Track progress & scroll top
    useEffect(() => {
        setVisited(prev => {
            const next = [...prev];
            next[module] = true;
            return next;
        });
        if(contentRef.current) contentRef.current.scrollTop = 0;
        stopTTS();
    }, [module, lang]);

    const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');
    const toggleLang = () => setLang(lang === 'zh' ? 'en' : 'zh');

    // --- Web Speech API (TTS) ---
    const playTTS = () => {
        if (!('speechSynthesis' in window)) {
            alert(lang === 'zh' ? '您的瀏覽器不支援語音導覽功能。' : 'Your browser does not support Speech Synthesis.');
            return;
        }
        window.speechSynthesis.cancel();
        if (isPlaying) {
            setIsPlaying(false);
            return;
        }
        
        const textToRead = m.tts || m.desc; 
        const utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = lang === 'zh' ? 'zh-TW' : 'en-US';
        utterance.rate = 1.0;
        
        utterance.onend = () => setIsPlaying(false);
        utterance.onerror = () => setIsPlaying(false);
        
        setIsPlaying(true);
        window.speechSynthesis.speak(utterance);
    };

    const stopTTS = () => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        setIsPlaying(false);
    };

    // --- Content Renderers ---
    
    // Module 0: Exec
    const renderExec = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg md:text-xl text-slate-600 dark:text-slate-300 font-medium leading-relaxed">{m.desc}</p>
            <div className="bg-[#D8C3A5]/20 dark:bg-slate-800 p-6 md:p-8 rounded-2xl border-l-4 border-[#004030] dark:border-[#D8C3A5] shadow-sm">
                <p className="text-base text-slate-700 dark:text-slate-300 leading-loose">{m.content}</p>
            </div>
        </div>
    );

    // Module 1: NPD
    const renderNPD = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            {m.image && (
                <div className="mt-6 w-full bg-white dark:bg-slate-200 p-2 rounded-xl shadow-md border border-slate-200 overflow-hidden group">
                    <img src={m.image} alt={m.imageAlt} className="w-full h-auto object-contain max-h-[400px] transform transition duration-500 group-hover:scale-[1.02]" />
                </div>
            )}
            <div className="grid gap-4 mt-6">
                {m.points.map((pt, idx) => (
                    <div key={idx} className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col md:flex-row gap-4 items-start">

                        <div>
                            <h3 className="font-bold text-lg mb-2 dark:text-white">{pt.title}</h3>
                            <p className="text-slate-600 dark:text-slate-400">{pt.text}</p>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );

    // Module 2: PM Competencies
    const renderPMComp = () => (
        <div className="animate-fade-in space-y-6">

    // Module 5: Synthesized Roles
    const renderSynRoles = () => (

                    <thead>
                        <tr className="bg-slate-100 dark:bg-slate-900">
                            {m.table.headers.map((h, i) => (
                                <th key={i} className="p-4 font-semibold text-slate-700 dark:text-slate-300 border-b dark:border-slate-700">{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {m.table.rows.map((r, i) => (
                            <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b dark:border-slate-700 last:border-0 group">
                                <td className="p-4 font-medium text-[#004030] dark:text-[#D8C3A5]">{r.level}</td>
                                <td className="p-4 font-bold">{r.role}</td>
                                <td className="p-4 italic text-slate-600 dark:text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{r.question}</td>
                                <td className="p-4 text-slate-600 dark:text-slate-400">{r.scope}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );

    // Module 6: Synthesized Drivers & Conclusion
    const renderSynDrivers = () => (
        <div className="animate-fade-in space-y-8">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 perspective">
                {m.comparisons.map((comp, idx) => (
                    <div key={idx} className="flip-card h-72 group cursor-pointer relative">
                        <div className="flip-card-inner relative w-full h-full shadow-sm rounded-2xl border border-slate-200 dark:border-slate-700">

                                <div className="inline-block px-4 py-1.5 rounded-full text-sm font-semibold mb-2 bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] w-max">

                                    {opt.title}
                                    {selected === i && (
                                        <Icon name={opt.correct ? "checkCircle" : "x"} className={`shrink-0 ml-2 ${opt.correct ? "text-emerald-500" : "text-rose-500"}`} />
                                    )}
                                </div>
                                {selected === i && (
                                    <div className={`text-sm mt-3 pt-3 border-t ${opt.correct ? 'border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300' : 'border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-300'} animate-fade-in`}>
                                        {opt.feedback}
                                    </div>
                                )}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // Module 8: Resources
    const ExternalResources = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <ul className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {m.links.map((link, i) => (
                    <li key={i}>
                        <a href={link.url} target="_blank" rel="noreferrer" className="flex items-start p-5 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:shadow-md hover:border-[#D8C3A5] transition-all group h-full">
                            <div className="mt-1 bg-[#D8C3A5]/20 dark:bg-slate-700 p-2 rounded-lg group-hover:bg-[#D8C3A5]/40 transition-colors">
                                <Icon name="link" className="text-[#004030] dark:text-[#D8C3A5]" size={24} />
                            </div>
                            <div className="ml-4 flex-1">
                                <h4 className="font-bold text-lg text-slate-800 dark:text-slate-200 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors">{link.title}</h4>
                                <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{link.desc}</p>
                            </div>
                        </a>
                    </li>
                ))}
            </ul>
        </div>
    );

    // Module 9: Journey
    const LearningJourney = () => {
        const completedCount = visited.filter(v => v).length;
        const progress = Math.round((completedCount / TOTAL_MODULES) * 100);
        return (
            <div className="animate-fade-in space-y-6">
                <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
                <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <div className="flex justify-between items-end mb-3">
                        <span className="font-bold text-slate-700 dark:text-slate-300 text-lg">{m.progressTitle}</span>
                        <span className="font-black text-3xl text-[#004030] dark:text-[#D8C3A5]">{progress}%</span>
                    </div>
                    <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 mb-8 overflow-hidden border border-slate-200 dark:border-slate-600">
                        <div className="bg-[#004030] dark:bg-[#D8C3A5] h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                        {t.nav.map((n, i) => (
                            <button 
                                key={i}
                                onClick={() => setModule(i)}
                                className={`flex items-center p-3 rounded-lg border text-left transition-colors ${
                                    visited[i] 
                                    ? 'border-emerald-200 bg-emerald-50 dark:bg-emerald-900/20 dark:border-emerald-800' 
                                    : 'border-slate-100 bg-slate-50 dark:bg-slate-800/50 dark:border-slate-700'
                                }`}
                            >
                                <Icon name={visited[i] ? "checkCircle" : "circle"} className={`shrink-0 mr-3 ${visited[i] ? 'text-emerald-500' : 'text-slate-300 dark:text-slate-600'}`} size={20} />
                                <span className={`text-sm font-medium truncate ${visited[i] ? 'text-slate-800 dark:text-slate-200' : 'text-slate-400 dark:text-slate-500'}`}>{n.title}</span>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const renderContent = () => {
        switch(module) {
            case 0: return renderExec();
            case 1: return renderNPD();
            case 2: return renderPMComp();
            case 3: 
            case 4: return renderFrameworks();
            case 5: return renderSynRoles();
            case 6: return renderSynDrivers();
            case 7: return <InteractiveLab />;
            case 8: return <ExternalResources />;
            case 9: return <LearningJourney />;
            default: return renderExec();
        }
    };

    return (
        <div className="min-h-screen flex flex-col pt-16 font-sans">
            {/* Header - Fixed & Never Moving */}
            <header className="fixed top-0 left-0 right-0 h-16 z-50 bg-[#004030] shadow-md border-b border-[#D8C3A5]">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
                    <div className="flex items-center">
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden p-2 -ml-2 rounded-md text-[#D8C3A5] hover:bg-white/10 mr-2 focus:outline-none">
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} size={24} />
                        </button>
                        <span className="font-serif font-black text-xl text-[#D8C3A5] tracking-widest truncate">{t.brand}</span>
                    </div>
                    <div className="flex items-center space-x-2 md:space-x-4 shrink-0">
                        <button onClick={toggleLang} className="flex items-center px-3 py-1.5 rounded-full bg-white/10 text-[#D8C3A5] hover:bg-white/20 transition-colors text-sm font-medium border border-[#D8C3A5]/30">
                            <Icon name="globe" size={16} className="mr-1.5" />
                            {lang === 'zh' ? 'EN' : '中文'}
                        </button>
                        <button onClick={toggleTheme} className="p-2 rounded-full text-[#D8C3A5] hover:bg-white/10 transition-colors border border-transparent hover:border-[#D8C3A5]/30">
                            <Icon name={theme === 'dark' ? "sun" : "moon"} size={20} />
                        </button>
                    </div>
                </div>
            </header>

            {/* Main Application Area */}
            <div className="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto relative">
                
                {/* Mobile Dropdown Menu (z-[100] & max-height with overflow-y-auto) */}
                {isMobileMenuOpen && (
                    <div className="md:hidden fixed inset-0 z-[90] bg-black/50" onClick={() => setIsMobileMenuOpen(false)}></div>
                )}
                <div 
                    ref={menuRef}
                    className={`md:hidden fixed top-16 left-0 right-0 bg-white dark:bg-slate-800 z-[100] shadow-xl border-b border-slate-200 dark:border-slate-700 transition-all duration-300 max-h-[calc(100vh-5rem)] overflow-y-auto origin-top ${isMobileMenuOpen ? 'scale-y-100 opacity-100' : 'scale-y-0 opacity-0 pointer-events-none'}`}
                >
                    <nav className="p-4 space-y-2">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => { setModule(idx); setIsMobileMenuOpen(false); }}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-colors ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030]' 
                                        : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span>{item.title}</span>
                                </button>
                            );
                        })}
                    </nav>
                </div>

                {/* Desktop Sidebar Navigation */}
                <aside className="hidden md:block w-72 shrink-0 p-4 lg:p-6 sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto">
                    <nav className="space-y-1">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setModule(idx)}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] shadow-md' 
                                        : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#004030] dark:hover:text-white'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span className="truncate text-left">{item.title}</span>
                                    {isActive && <Icon name="chevronRight" size={16} className="ml-auto opacity-70 shrink-0" />}
                                </button>
                            );
                        })}
                    </nav>
                </aside>

                {/* Main Content Area */}
                <main ref={contentRef} className="flex-1 min-w-0 p-4 sm:p-6 md:p-8 scroll-smooth overflow-y-auto">
                    
                    {/* Header Text for the Page */}
                    <div className="mb-6 md:mb-8 pb-4 border-b border-slate-200 dark:border-slate-700">
                        <h1 className="text-2xl md:text-3xl lg:text-4xl font-bold text-slate-900 dark:text-white mb-2">{t.docTitle}</h1>
                        <p className="text-sm md:text-base text-slate-600 dark:text-slate-400">{t.subtitle}</p>
                    </div>

                    {/* Content Card */}
                    <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8 relative">
                        {/* Audio TTS Button */}
                        <div className="absolute top-4 right-4 sm:top-6 sm:right-6">
                            <button 
                                onClick={playTTS} 
                                className={`flex items-center gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-bold transition-all shadow-sm border ${isPlaying ? 'bg-rose-100 text-rose-700 border-rose-200 dark:bg-rose-900/30 dark:text-rose-400' : 'bg-slate-100 text-[#004030] border-slate-200 hover:bg-[#D8C3A5]/20 dark:bg-slate-700 dark:text-[#D8C3A5] dark:border-slate-600'}`}
                            >
                                <Icon name={isPlaying ? "stop" : "volume"} size={16} />
                                <span className="hidden sm:inline">{isPlaying ? t.audio_stop : t.audio_play}</span>
                            </button>
                        </div>

                        <div className="mt-8 sm:mt-0 pt-4 sm:pt-0">
                            <h2 className="text-xl md:text-2xl font-bold mb-6 text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] inline-block pb-2 pr-4">{m.title}</h2>
                            {renderContent()}
                        </div>
                        
                        {/* Footer Navigation (Next/Prev Buttons) */}
                        <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <button 
                                onClick={() => setModule(Math.max(0, module - 1))} 
                                disabled={module === 0} 
                                className="px-4 sm:px-6 py-2.5 text-slate-600 dark:text-[#D8C3A5] border border-slate-200 dark:border-[#D8C3A5]/30 hover:bg-slate-50 dark:hover:bg-[#D8C3A5]/10 rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider flex items-center transition-colors"
                            >
                                ← {t.nav_prev}
                            </button>
                            <button 
                                onClick={() => setModule(Math.min(TOTAL_MODULES - 1, module + 1))} 
                                disabled={module === TOTAL_MODULES - 1} 
                                className="px-5 sm:px-8 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-[#D8C3A5] dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider shadow-md flex items-center transition-colors"
                            >
                                {t.nav_next} <Icon name="arrowRight" size={16} className="ml-2"/>
                            </button>
                        </div>
                    </div>
                </main>
            </div>

            {/* Application Footer - Ensures No Overflow on Mobile */}
            <footer className="mt-auto bg-[#004030] dark:bg-slate-950 border-t border-[#D8C3A5]">
                <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-2">
                    <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs truncate max-w-[50%]">{t.date} · {t.copyright}</span>
                    <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs flex items-center gap-1 shrink-0">
                        Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a>
                    </span>
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
