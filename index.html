                        { stage: "Marketing / Feasibility", comp: "Strategy (20%), Portfolio Mgt (20%), Market Research (10%)", domain: "Business-Oriented" },
                        { stage: "Product Design / Tooling", comp: "PI Process (10%), PDD Tools (10%)", domain: "Technical-Oriented" },
                        { stage: "Engineering / Launch", comp: "Culture & Leadership (15%), PI Management (15%)", domain: "Management-Oriented" }
                    ]
                }
            },

                table: {
                    headers: ["Decision Tier", "Lead Role", "Core Question", "Defense Line"],
                    rows: [
                        { level: "Strategic", role: "PM", question: "Build it or not?", scope: "PM handles Sales: blocks external interference and custom requests." },
                        { level: "Tactical", role: "PO / PL", question: "What to build first?", scope: "PO/PL manages RD: leads tech trade-offs to keep dev rhythm." }
                    ]
                }
            },
            {
                title: "6. Synthesized Matrix & Drivers",
                desc: "From core motivations to matrix collaboration, formulating the universal formula.",
                comparisons: [
                    { type: "Software PO", focus: "Value-driven", detail: "Focuses on 'building the right thing', prioritizing business impact." },
                    { type: "Hardware PL", focus: "Feasibility-driven", detail: "Restricted by supply chains, focuses on 'getting it built' with cost/tech priority." }
                ],
                quote: "The PM decides the direction of product success (Strategy), while the PO/PL decides how it gets built step-by-step (Execution). When conflicts escalate, the PM makes the global value call."
            },
            {
                title: "7. Interactive Lab",
                desc: "Scenario Simulation: Make the best decision for unexpected situations.",
                quiz: {
                    question: "[Scenario] In a matrixed hardware project, the Procurement (PUR) and R&D departments strongly conflict over the risks of a cheaper component. Both PCCs refuse to yield. What is the next step?",
                    options: [
                        { title: "A. The PL forces a technical decision.", correct: false, feedback: "Incorrect. This is beyond specs; it involves 'margin (PUR)' vs. 'schedule risk (RD)'." },
                        { title: "B. Escalate to the PM for a global business decision.", correct: true, feedback: "Correct! Department PCCs look at local KPIs. Only the PM has the global view to make a compromise based on final market commitments and profit strategy." },
                        { title: "C. Switch to Agile to rewrite requirements.", correct: false, feedback: "Incorrect. Hardware lead times are strict. You cannot solve physical supply issues purely with software Agile thinking." }
                    ]
                }
            },
            {
                title: "8. External Resources",
                desc: "Deep dive into cross-domain project management guides:",
                links: [
                    { title: "Agile Manifesto", desc: "Understand the core spirit of value-driven software engineering.", url: "https://agilemanifesto.org/" },
                    { title: "The Scrum Guide", desc: "Deep dive into PO definitions.", url: "https://scrumguides.org/" },
                    { title: "PMI PMBOK Guide", desc: "Explore Matrix Organizations and integration management.", url: "https://www.pmi.org/" }
                ]
            },
            {
                title: "9. Learning Journey",
                desc: "Track your progress and master the complete framework:",
                progressTitle: "Course Completion"
            }
        ]
    }
};

// --- Main App Component ---
const App = () => {
    const [lang, setLang] = useState('zh');
    const [theme, setTheme] = useState('light');
    const [module, setModule] = useState(0); 
    const [visited, setVisited] = useState(Array(TOTAL_MODULES).fill(false));
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
    const [ttsState, setTtsState] = useState('idle'); // 'idle', 'playing', 'paused'
    const [voicesLoaded, setVoicesLoaded] = useState(false);
    
    const contentRef = useRef(null);
    const menuRef = useRef(null);

    const t = contentData[lang];
    const m = t.modules[module];

    // Initialize TTS Voices
    useEffect(() => {
        const loadVoices = () => {
            if(window.speechSynthesis.getVoices().length > 0) {
                setVoicesLoaded(true);
            }
        };
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    }, []);

    // Theme initialization
    useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [theme]);

    // Handle outside click for mobile menu
    useEffect(() => {
        const handleClickOutside = (event) => {
            if (menuRef.current && !menuRef.current.contains(event.target)) {
                setIsMobileMenuOpen(false);
            }
        };
        if (isMobileMenuOpen) {
            document.addEventListener("mousedown", handleClickOutside);
        }
        return () => {
            document.removeEventListener("mousedown", handleClickOutside);
        };
    }, [isMobileMenuOpen]);

    // Scroll to Top Utility
    const scrollToTop = () => {
        if (contentRef.current) {
            contentRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // Track progress & scroll top on module change
    useEffect(() => {
        setVisited(prev => {
            const next = [...prev];
            next[module] = true;
            return next;
        });
        scrollToTop();
        stopTTS();
    }, [module, lang]);

    const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');
    const toggleLang = () => setLang(lang === 'zh' ? 'en' : 'zh');

    // --- Web Speech API (TTS) ---
    const getPreferredVoice = (langCode) => {
        const voices = window.speechSynthesis.getVoices();
        if (langCode === 'zh') {
            return voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Yating') || v.name.includes('Ya-Ting'))) ||
                   voices.find(v => v.lang === 'zh-TW') ||
                   voices.find(v => v.lang.includes('zh'));
        } else {
            return voices.find(v => v.lang === 'en-GB' && (v.name.includes('Male') || v.name.includes('George'))) ||
                   voices.find(v => v.lang === 'en-GB') ||
                   voices.find(v => v.lang.includes('en'));
        }
    };

    const generateFullText = (mod) => {
        let parts = [mod.title, mod.desc];
        if (mod.content) parts.push(mod.content);
        if (mod.points) mod.points.forEach((p, i) => parts.push(`第${i+1}點：${p.title}。${p.text}`));
        if (mod.table) {
            parts.push(lang === 'zh' ? '表格重點整理：' : 'Table Summary:');
            mod.table.rows.forEach(r => {
                const k = r.level || r.stage;
                const v = r.role || r.comp;
                const s = r.scope || r.domain;
                parts.push(`${k}，負責角色為${v}。涵蓋範疇：${s}。`);
            });
        }
        if (mod.cards) mod.cards.forEach(c => parts.push(`情境：${c.front}。應對：${c.back}，${c.backDesc}`));
        if (mod.nodes) mod.nodes.forEach(n => parts.push(`${n.title}。${n.desc}`));
        if (mod.comparisons) mod.comparisons.forEach(c => parts.push(`${c.type}，主要考量為${c.focus}。${c.detail}`));
        if (mod.quote) parts.push(`總結論點：${mod.quote}`);
        if (mod.quiz) {
            parts.push(`互動實驗室情境題：${mod.quiz.question}`);
            mod.quiz.options.forEach((o, i) => parts.push(`選項 ${String.fromCharCode(65+i)}：${o.title}。`));
        }
        if (mod.links) {
            parts.push(lang === 'zh' ? '推薦外部資源：' : 'External Resources:');
            mod.links.forEach(l => parts.push(`${l.title}。${l.desc}`));
        }
        if (mod.progressTitle) parts.push(mod.progressTitle);
        // Returns purely concatenated string without any HTML or Icons
        return parts.join(' ');
    };

    const handleTtsEnd = () => setTtsState('idle');

    const playPauseTTS = () => {
        if (!('speechSynthesis' in window)) {
            alert(lang === 'zh' ? '您的瀏覽器不支援語音導覽功能。' : 'Your browser does not support Speech Synthesis.');
            return;
        }
        
        if (ttsState === 'playing') {
            window.speechSynthesis.pause();
            setTtsState('paused');
        } else if (ttsState === 'paused') {
            window.speechSynthesis.resume();
            setTtsState('playing');
        } else {
            window.speechSynthesis.cancel();
            const text = generateFullText(m);
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = getPreferredVoice(lang);
            utterance.lang = lang === 'zh' ? 'zh-TW' : 'en-GB';
            utterance.rate = 1.0;
            utterance.onend = handleTtsEnd;
            utterance.onerror = handleTtsEnd;
            window.speechSynthesis.speak(utterance);
            setTtsState('playing');
        }
    };

    const stopTTS = () => {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        setTtsState('idle');
    };

    // --- Content Renderers ---
    
    // Module 0: Exec
    const renderExec = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg md:text-xl text-slate-600 dark:text-slate-300 font-medium leading-relaxed">{m.desc}</p>
            <div className="bg-[#D8C3A5]/20 dark:bg-slate-800 p-6 md:p-8 rounded-2xl border-l-4 border-[#004030] dark:border-[#D8C3A5] shadow-sm">
                <p className="text-base text-slate-700 dark:text-slate-300 leading-loose">{m.content}</p>
            </div>
            
            {/* Quick Links to Modules 1-6 */}
            <div className="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700">
                <h3 className="text-xl font-bold text-[#004030] dark:text-[#D8C3A5] mb-4 flex items-center gap-2">
                    <Icon name="layers" size={24} />
                    {lang === 'zh' ? '主題分頁 1-6' : 'Theme Modules 1-6'}
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4">
                    {t.nav.slice(1, 7).map((item, idx) => (
                        <button 
                            key={item.id}
                            onClick={() => { setModule(idx + 1); scrollToTop(); }}
                            className="flex items-center p-3 sm:p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left group"
                        >
                            <div className="bg-[#004030]/10 dark:bg-slate-700 p-2 rounded-lg mr-3 group-hover:bg-[#004030] group-hover:text-[#D8C3A5] transition-colors text-[#004030] dark:text-[#D8C3A5] shrink-0">
                                <Icon name={item.icon} size={20} />
                            </div>
                            <span className="font-bold text-sm text-slate-700 dark:text-slate-200 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] line-clamp-2">{item.title}</span>
                        </button>
                    ))}
                </div>
            </div>
        </div>
    );

    // Module 1: NPD
    const renderNPD = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            {m.image && (
                <div className="mt-6 w-full bg-white dark:bg-slate-200 p-2 rounded-xl shadow-md border border-slate-200 overflow-hidden group">
                    <img src={m.image} alt={m.imageAlt} className="w-full h-auto object-contain max-h-[400px] transform transition duration-500 group-hover:scale-[1.02]" />
                </div>
            )}
            <div className="grid gap-4 mt-6">
                {m.points.map((pt, idx) => (
                    <div key={idx} className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col md:flex-row gap-4 items-start">
                        <div className="bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] font-bold text-xl w-10 h-10 flex items-center justify-center rounded-lg shrink-0">
                            {idx + 1}
                        </div>
                        <div>
                            <h3 className="font-bold text-lg mb-2 dark:text-white">{pt.title}</h3>
                            <p className="text-slate-600 dark:text-slate-400">{pt.text}</p>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );

    // Module 2: PM Competencies
    const renderPMComp = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            {m.image && (
                <div className="mt-6 w-full bg-white dark:bg-slate-200 p-2 rounded-xl shadow-md border border-slate-200 overflow-hidden group">
                    <img src={m.image} alt={m.imageAlt} className="w-full h-auto object-contain max-h-[400px] transform transition duration-500 group-hover:scale-[1.02]" />
                </div>
            )}
            <div className="overflow-x-auto rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mt-6">
                <table className="w-full text-left border-collapse bg-white dark:bg-slate-800">
                    <thead>
                        <tr className="bg-slate-100 dark:bg-slate-900">
                            {m.table.headers.map((h, i) => (
                                <th key={i} className="p-4 font-semibold text-slate-700 dark:text-slate-300 border-b dark:border-slate-700">{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {m.table.rows.map((r, i) => (
                            <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b dark:border-slate-700 last:border-0">
                                <td className="p-4 font-bold text-[#004030] dark:text-[#D8C3A5]">{r.stage}</td>
                                <td className="p-4 text-slate-700 dark:text-slate-300">{r.comp}</td>
                                <td className="p-4 italic text-slate-500 dark:text-slate-400">{r.domain}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );

    // Module 3 & 4: Frameworks
    const renderFrameworks = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {m.points.map((pt, idx) => (
                    <div key={idx} className={`bg-white dark:bg-slate-800 p-6 rounded-xl border-t-4 shadow-sm ${module === 3 ? 'border-blue-500 dark:border-blue-400' : 'border-purple-500 dark:border-purple-400'}`}>
                        <h3 className="font-bold text-lg mb-3 dark:text-white flex items-center gap-2">
                            <Icon name={module === 3 ? "zap" : "matrix"} size={20} className={module === 3 ? "text-blue-500" : "text-purple-500"} />
                            {pt.title}
                        </h3>
                        <p className="text-slate-600 dark:text-slate-400">{pt.text}</p>
                    </div>
                ))}
            </div>
        </div>
    );

    // Module 5: Synthesized Roles
    const renderSynRoles = () => (
        <div className="animate-fade-in space-y-8">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col lg:flex-row items-center justify-center gap-4 lg:gap-8 transform transition hover:scale-[1.01]">
                <div className="text-center p-4 bg-blue-50 dark:bg-blue-900/30 rounded-xl border border-blue-100 dark:border-blue-800 w-full lg:w-auto">
                    <div className="font-bold text-2xl text-blue-700 dark:text-blue-400">{m.equation.left}</div>
                </div>
                <div className="text-3xl font-black text-slate-400 dark:text-slate-500">{m.equation.equals}</div>
                <div className="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
                    <div className="text-center p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl border border-emerald-100 dark:border-emerald-800 flex-1">
                        <div className="font-bold text-xl text-emerald-700 dark:text-emerald-400">{m.equation.right1}</div>
                        <div className="text-sm text-emerald-600 dark:text-emerald-500 mt-1">{m.equation.right1_sub}</div>
                    </div>
                    <div className="text-3xl font-black text-slate-400 dark:text-slate-500 self-center">+</div>
                    <div className="text-center p-4 bg-amber-50 dark:bg-amber-900/30 rounded-xl border border-amber-100 dark:border-amber-800 flex-1">
                        <div className="font-bold text-xl text-amber-700 dark:text-amber-400">{m.equation.right2}</div>
                        <div className="text-sm text-amber-600 dark:text-amber-500 mt-1">{m.equation.right2_sub}</div>
                    </div>
                </div>
            </div>
            <div className="overflow-x-auto rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <table className="w-full text-left border-collapse bg-white dark:bg-slate-800">
                    <thead>
                        <tr className="bg-slate-100 dark:bg-slate-900">
                            {m.table.headers.map((h, i) => (
                                <th key={i} className="p-4 font-semibold text-slate-700 dark:text-slate-300 border-b dark:border-slate-700">{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {m.table.rows.map((r, i) => (
                            <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b dark:border-slate-700 last:border-0 group">
                                <td className="p-4 font-medium text-[#004030] dark:text-[#D8C3A5]">{r.level}</td>
                                <td className="p-4 font-bold">{r.role}</td>
                                <td className="p-4 italic text-slate-600 dark:text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{r.question}</td>
                                <td className="p-4 text-slate-600 dark:text-slate-400">{r.scope}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );

    // Module 6: Synthesized Drivers & Conclusion
    const renderSynDrivers = () => (
        <div className="animate-fade-in space-y-8">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 perspective">
                {m.comparisons.map((comp, idx) => (
                    <div key={idx} className="flip-card h-72 group cursor-pointer relative">
                        <div className="flip-card-inner relative w-full h-full shadow-sm rounded-2xl border border-slate-200 dark:border-slate-700">
                            <div className="absolute w-full h-full backface-hidden bg-white dark:bg-slate-800 rounded-2xl flex flex-col justify-center p-6 sm:p-8">
                                <h3 className="text-2xl font-bold mb-4 dark:text-white">{comp.type}</h3>
                                <div className="inline-block px-4 py-1.5 rounded-full text-sm font-semibold mb-2 bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] w-max">
                                    {comp.focus}
                                </div>
                                <p className="mt-4 text-sm text-slate-400 dark:text-slate-500 animate-pulse">{lang === 'zh' ? '點擊翻轉查看詳細說明' : 'Click to flip for details'}</p>
                            </div>
                            <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-[#004030] dark:bg-slate-900 rounded-2xl border border-[#D8C3A5] flex flex-col justify-center p-6 sm:p-8 text-white">
                                <h3 className="text-xl font-bold text-[#D8C3A5] mb-4">{comp.type}</h3>
                                <p className="text-[#D8C3A5]/90 leading-relaxed text-base">{comp.detail}</p>
                            </div>
                        </div>
                    </div>
                ))}
            </div>
            <blockquote className="relative p-6 sm:p-8 bg-[#D8C3A5]/10 dark:bg-slate-800/80 rounded-2xl border-l-8 border-[#004030] dark:border-[#D8C3A5] shadow-sm mt-8">
                <p className="text-lg md:text-xl font-serif leading-relaxed text-slate-800 dark:text-slate-200">
                    {m.quote}
                </p>
            </blockquote>
        </div>
    );

    // Module 7: Interactive Lab
    const InteractiveLab = () => {
        const [selected, setSelected] = useState(null);
        return (
            <div className="animate-fade-in space-y-6 w-full max-w-full">
                <p className="text-lg text-slate-600 dark:text-slate-300 font-medium">{m.desc}</p>
                <div className="bg-[#004030]/5 dark:bg-slate-800/50 p-4 sm:p-6 md:p-8 rounded-2xl border border-[#004030]/10 dark:border-slate-700">
                    <h3 className="text-lg sm:text-xl font-bold text-[#004030] dark:text-[#D8C3A5] mb-6 leading-relaxed">
                        {m.quiz.question}
                    </h3>
                    <div className="grid gap-4">
                        {m.quiz.options.map((opt, i) => (
                            <button
                                key={i}
                                onClick={() => setSelected(i)}
                                className={`p-4 sm:p-5 text-left rounded-xl border-2 transition-all duration-300 shadow-sm ${
                                    selected === i 
                                    ? (opt.correct 
                                        ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30' 
                                        : 'border-rose-500 bg-rose-50 dark:bg-rose-900/30')

                            >
                                <div className="font-bold text-slate-800 dark:text-slate-200 flex items-center justify-between">
                                    {opt.title}
                                    {selected === i && (
                                        <Icon name={opt.correct ? "checkCircle" : "x"} className={`shrink-0 ml-2 ${opt.correct ? "text-emerald-500" : "text-rose-500"}`} />
                                    )}
                                </div>
                                {selected === i && (
                                    <div className={`text-sm mt-3 pt-3 border-t ${opt.correct ? 'border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300' : 'border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-300'} animate-fade-in`}>
                                        {opt.feedback}
                                    </div>
                                )}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // Module 8: Resources
    const ExternalResources = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
            <ul className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {m.links.map((link, i) => (
                    <li key={i}>
                        <a href={link.url} target="_blank" rel="noreferrer" className="flex items-start p-5 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:shadow-md hover:border-[#D8C3A5] transition-all group h-full">
                            <div className="mt-1 bg-[#D8C3A5]/20 dark:bg-slate-700 p-2 rounded-lg group-hover:bg-[#D8C3A5]/40 transition-colors">
                                <Icon name="link" className="text-[#004030] dark:text-[#D8C3A5]" size={24} />
                            </div>
                            <div className="ml-4 flex-1">
                                <h4 className="font-bold text-lg text-slate-800 dark:text-slate-200 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors">{link.title}</h4>
                                <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{link.desc}</p>
                            </div>
                        </a>
                    </li>
                ))}
            </ul>
        </div>
    );

    // Module 9: Journey
    const LearningJourney = () => {
        const completedCount = visited.filter(v => v).length;
        const progress = Math.round((completedCount / TOTAL_MODULES) * 100);
        return (
            <div className="animate-fade-in space-y-6">
                <p className="text-lg text-slate-600 dark:text-slate-300">{m.desc}</p>
                <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <div className="flex justify-between items-end mb-3">
                        <span className="font-bold text-slate-700 dark:text-slate-300 text-lg">{m.progressTitle}</span>
                        <span className="font-black text-3xl text-[#004030] dark:text-[#D8C3A5]">{progress}%</span>
                    </div>
                    <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-4 mb-8 overflow-hidden border border-slate-200 dark:border-slate-600">
                        <div className="bg-[#004030] dark:bg-[#D8C3A5] h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                        {t.nav.map((n, i) => (
                            <button 
                                key={i}
                                onClick={() => setModule(i)}
                                className={`flex items-center p-3 rounded-lg border text-left transition-colors ${
                                    visited[i] 
                                    ? 'border-emerald-200 bg-emerald-50 dark:bg-emerald-900/20 dark:border-emerald-800' 
                                    : 'border-slate-100 bg-slate-50 dark:bg-slate-800/50 dark:border-slate-700'
                                }`}
                            >
                                <Icon name={visited[i] ? "checkCircle" : "circle"} className={`shrink-0 mr-3 ${visited[i] ? 'text-emerald-500' : 'text-slate-300 dark:text-slate-600'}`} size={20} />
                                <span className={`text-sm font-medium truncate ${visited[i] ? 'text-slate-800 dark:text-slate-200' : 'text-slate-400 dark:text-slate-500'}`}>{n.title}</span>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const renderContent = () => {
        switch(module) {
            case 0: return renderExec();
            case 1: return renderNPD();
            case 2: return renderPMComp();
            case 3: 
            case 4: return renderFrameworks();
            case 5: return renderSynRoles();
            case 6: return renderSynDrivers();
            case 7: return <InteractiveLab />;
            case 8: return <ExternalResources />;
            case 9: return <LearningJourney />;
            default: return renderExec();
        }
    };

    return (
        <div className="min-h-screen flex flex-col pt-16 pb-12 font-sans bg-slate-50 dark:bg-slate-900 relative">
            {/* Header - Fixed & Never Moving */}
            <header className="fixed top-0 left-0 right-0 h-16 z-50 bg-[#004030] shadow-md border-b border-[#D8C3A5]">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
                    {/* Left: Brand + Title mapped to scroll to top */}
                    <div className="flex items-center min-w-0 flex-1">
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden p-2 -ml-2 rounded-md text-[#D8C3A5] hover:bg-white/10 mr-2 focus:outline-none shrink-0">
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} size={24} />
                        </button>
                        <div className="flex items-baseline cursor-pointer truncate hover:opacity-80 transition-opacity" onClick={scrollToTop} title={lang === 'zh' ? '回到頂端' : 'Scroll to Top'}>
                            <span className="font-serif font-black text-xl text-[#D8C3A5] tracking-widest shrink-0">{t.brand}</span>
                            <span className="ml-3 text-[#D8C3A5]/90 font-bold text-sm sm:text-base truncate hidden sm:inline">{t.headerTitle}</span>
                        </div>
                    </div>
                    
                    {/* Right: TTS + Global Toggles */}
                    <div className="flex items-center space-x-1 sm:space-x-3 shrink-0 pl-2">
                        {/* Audio Guide Controls */}
                        <div className="flex items-center space-x-1 mr-1">
                            <button 
                                onClick={playPauseTTS} 
                                className={`flex items-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-2.5 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all shadow-sm border ${ttsState === 'playing' ? 'bg-[#D8C3A5]/20 text-[#D8C3A5] border-[#D8C3A5]/50' : 'bg-white/10 text-[#D8C3A5] border-[#D8C3A5]/30 hover:bg-white/20'}`}
                                title={ttsState === 'playing' ? t.audio_pause : ttsState === 'paused' ? t.audio_resume : t.audio_play}
                            >
                                <Icon name={ttsState === 'playing' ? 'pause' : 'play'} size={14} />
                                <span className="hidden lg:inline">
                                    {ttsState === 'playing' ? t.audio_pause : ttsState === 'paused' ? t.audio_resume : t.audio_play}
                                </span>
                            </button>
                            {ttsState !== 'idle' && (
                                <button 
                                    onClick={stopTTS} 
                                    className="flex items-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-2.5 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all shadow-sm border bg-rose-500/20 text-rose-300 border-rose-500/50 hover:bg-rose-500/40"
                                    title={t.audio_stop}
                                >
                                    <Icon name="stop" size={14} />
                                    <span className="hidden lg:inline">{t.audio_stop}</span>
                                </button>
                            )}
                        </div>

                        <button onClick={toggleLang} className="flex items-center px-2 sm:px-3 py-1.5 rounded-full bg-white/10 text-[#D8C3A5] hover:bg-white/20 transition-colors text-xs sm:text-sm font-medium border border-[#D8C3A5]/30">
                            <Icon name="globe" size={14} className="sm:mr-1.5" />
                            <span className="hidden sm:inline">{lang === 'zh' ? 'EN' : '中'}</span>
                        </button>
                        <button onClick={toggleTheme} className="p-1.5 sm:p-2 rounded-full text-[#D8C3A5] hover:bg-white/10 transition-colors border border-transparent hover:border-[#D8C3A5]/30">
                            <Icon name={theme === 'dark' ? "sun" : "moon"} size={18} />
                        </button>
                    </div>
                </div>
            </header>

            {/* Main Application Area */}
            <div className="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto relative h-full">
                
                {/* Mobile Dropdown Menu (z-[100] & max-height with overflow-y-auto) */}
                {isMobileMenuOpen && (
                    <div className="md:hidden fixed inset-0 z-[90] bg-black/50" onClick={() => setIsMobileMenuOpen(false)}></div>
                )}
                <div 
                    ref={menuRef}
                    className={`md:hidden fixed top-16 left-0 right-0 bg-white dark:bg-slate-800 z-[100] shadow-xl border-b border-slate-200 dark:border-slate-700 transition-all duration-300 max-h-[calc(100vh-7rem)] overflow-y-auto origin-top ${isMobileMenuOpen ? 'scale-y-100 opacity-100' : 'scale-y-0 opacity-0 pointer-events-none'}`}
                >
                    <nav className="p-4 space-y-2">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => { setModule(idx); setIsMobileMenuOpen(false); }}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-colors ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030]' 
                                        : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span>{item.title}</span>
                                </button>
                            );
                        })}
                    </nav>
                </div>

                {/* Desktop Sidebar Navigation */}
                <aside className="hidden md:block w-72 shrink-0 p-4 lg:p-6 sticky top-16 h-[calc(100vh-7rem)] overflow-y-auto">
                    <nav className="space-y-1">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setModule(idx)}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] shadow-md' 
                                        : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#004030] dark:hover:text-white'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span className="truncate text-left">{item.title}</span>
                                    {isActive && <Icon name="chevronRight" size={16} className="ml-auto opacity-70 shrink-0" />}
                                </button>
                            );
                        })}
                    </nav>
                </aside>

                {/* Main Content Area */}
                <main ref={contentRef} className="flex-1 min-w-0 p-4 sm:p-6 md:p-8 scroll-smooth overflow-y-auto h-[calc(100vh-7rem)]">
                    
                    {/* Header Text for the Page */}
                    <div className="mb-6 md:mb-8 pb-4 border-b border-slate-200 dark:border-slate-700">
                        <h1 className="text-2xl md:text-3xl lg:text-4xl font-bold text-slate-900 dark:text-white mb-2">{t.docTitle}</h1>
                        <p className="text-sm md:text-base text-slate-600 dark:text-slate-400">{t.subtitle}</p>
                    </div>

                    {/* Content Card */}
                    <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8 relative">
                        <h2 className="text-xl md:text-2xl font-bold mb-6 text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] inline-block pb-2 pr-4">{m.title}</h2>
                        {renderContent()}
                        
                        {/* Footer Navigation (Next/Prev Buttons) */}
                        <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <button 
                                onClick={() => setModule(Math.max(0, module - 1))} 
                                disabled={module === 0} 
                                className="px-4 sm:px-6 py-2.5 text-slate-600 dark:text-[#D8C3A5] border border-slate-200 dark:border-[#D8C3A5]/30 hover:bg-slate-50 dark:hover:bg-[#D8C3A5]/10 rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider flex items-center transition-colors"
                            >
                                ← {t.nav_prev}
                            </button>
                            <button 
                                onClick={() => setModule(Math.min(TOTAL_MODULES - 1, module + 1))} 
                                disabled={module === TOTAL_MODULES - 1} 
                                className="px-5 sm:px-8 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-[#D8C3A5] dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider shadow-md flex items-center transition-colors"
                            >
                                {t.nav_next} <Icon name="arrowRight" size={16} className="ml-2"/>
                            </button>
                        </div>
                    </div>
                </main>
            </div>

            {/* Application Footer - Fixed RWD */}
            <footer className="fixed bottom-0 left-0 right-0 h-12 bg-[#004030] dark:bg-slate-950 border-t border-[#D8C3A5] z-50">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center gap-2">
                    <div className="flex items-center gap-3 overflow-hidden">
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
                    </div>
                    <div className="flex items-center gap-4 shrink-0">
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs hidden sm:flex items-center gap-1">
                            Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors truncate">Prof. Shihmin Lo</a>
                        </span>
                        <button onClick={scrollToTop} className="text-[#D8C3A5] hover:text-white text-[10px] sm:text-xs font-bold flex items-center gap-1 uppercase tracking-wider transition-colors group">
                            Top <Icon name="arrowUp" size={14} className="group-hover:-translate-y-0.5 transition-transform" />
                        </button>
                    </div>
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
