                    { question: "「產品組合管理 (Portfolio Management)」的主要目的為何？", options: [ {title: "分配單一專案內工程師的每日工作", correct: false, feedback: "錯誤。這是執行層面的任務。"}, {title: "平衡公司多項產品間的資源、風險與收益", correct: true, feedback: "正確。產品組合管理是在宏觀層面上做資源配置，確保公司總體獲利。"}, {title: "管理工廠生產線的庫存零件", correct: false, feedback: "錯誤。那是供應鏈與物管 (MC) 的職責。"} ] },
                    { question: "為什麼 PM 需要具備「無權力影響 (Influence without Authority)」的能力？", options: [ {title: "因為 PM 通常是全公司的最高執行長", correct: false, feedback: "錯誤。PM 通常位階平行於其他部門主管。"}, {title: "因為 PM 往往不是 RD 的直屬主管，需靠願景與數據說服團隊", correct: true, feedback: "正確。矩陣組織中，PM 需跨部門領導，因此軟實力與影響力極為關鍵。"}, {title: "因為 PM 不需要為產品的市場成敗負責", correct: false, feedback: "錯誤。PM 必須為產品最終的商業成敗負責。"} ] },

            {
                title: "3. 軟體工程 Agile/Scrum",
                desc: "敏捷開發 (Agile) 是一種以使用者價值為核心，強調迭代、漸進式交付的軟體開發架構。",
                deepDive: [
                    "敏捷軟體開發宣言 (Agile Manifesto) 顛覆了傳統軟體工程。它強調「個人與互動重於流程與工具」、「可用的軟體重於詳盡的文件」、「與客戶合作重於合約協商」以及「回應變化重於遵循計畫」。這種典範轉移之所以能在軟體界成功，根本原因在於軟體程式碼的「修改成本 (Cost of Change)」極低，允許團隊透過快速試錯來逼近完美。",
                    "在 Scrum 框架中，經驗主義 (Empiricism) 是其三大支柱：透明性 (Transparency)、檢驗 (Inspection) 與調適 (Adaptation)。Product Owner (PO) 作為價值的守門員，負責動態排序 Product Backlog，確保開發團隊在每次短短 1-4 週的 Sprint (衝刺期) 中，都能產出具備最高商業價值的潛在可發布增量 (Increment)。",
                    "有別於硬體的 Waterfall 模型，Scrum 摒棄了厚重的期初規格書 (PRD)。PO 透過 User Story (使用者故事) 來描述需求，並在 Sprint Planning 會議中與開發團隊共同決定當期承諾。當遭遇技術瓶頸時，PO 擁有在 Sprint 內進行功能裁切 (Scope cut) 的絕對戰術決策權。"
                ],
                points: [
                    { title: "Scrum 核心角色", text: "Product Owner (PO) 決定產品價值與待辦清單順序；Scrum Master 確保流程順暢；開發團隊 (Developers) 負責實作產出。" },
                    { title: "反覆運算與交付", text: "透過 Sprint（衝刺期）進行短期且高頻的開發循環，每個 Sprint 結束皆需產出可用的潛在發布增量。" },
                    { title: "Agile vs. V-Model", text: "相較於傳統 V-Model 的嚴謹循序漸進與需求凍結，Agile 擁抱變更，透過持續回饋來修正方向，適用於需求變化快且修改成本低的軟體環境。" }
                ],
                flipCards: [
                    { front: "Sprint", back: "衝刺期：Scrum 中固定長度 (通常為 1-4 週) 的開發週期，團隊在此期間內專注完成承諾的項目。" },
                    { front: "Product Backlog", back: "產品待辦清單：由 PO 負責維護與排序的動態需求列表，是產品所有變更與新增功能的唯一來源。" },
                    { front: "User Story", back: "使用者故事：從終端使用者視角出發的需求描述格式，強調「誰」、「想要什麼」以及「為了達成什麼商業價值」。" },
                    { front: "Scrum Master", back: "敏捷教練：負責移除團隊開發障礙，確保 Scrum 框架被正確理解與執行的僕人式領導者。" },
                    { front: "Increment", back: "潛在可發布增量：每個 Sprint 結束時，團隊交付的必須是經過測試、可獨立運作且能帶來價值的軟體版本。" },
                    { front: "Daily Scrum", back: "每日站會：開發團隊每日進行的15分鐘簡短同步會議，用以檢視進度與提出開發障礙。" }
                ],
                quizBank: [
                    { question: "下列何者是 Scrum 框架中的三大支柱之一？", options: [ {title: "合約協商", correct: false, feedback: "錯誤。敏捷宣言強調客戶合作重於合約協商。"}, {title: "透明性 (Transparency)", correct: true, feedback: "正確。Scrum 基於經驗主義，三大支柱為透明性、檢驗與調適。"}, {title: "零缺陷保證", correct: false, feedback: "錯誤。這並非 Scrum 定義的框架支柱。"} ] },
                    { question: "在 Scrum 團隊中，誰負責對 Product Backlog (產品待辦清單) 進行優先順序的排列？", options: [ {title: "Scrum Master", correct: false, feedback: "錯誤。SM 負責流程與排除障礙。"}, {title: "Product Owner (PO)", correct: true, feedback: "正確。PO 是價值的守門員，全權負責 Backlog 的排序與投資報酬率。"}, {title: "開發團隊 (Developers)", correct: false, feedback: "錯誤。開發團隊負責估算工時與執行實作，不負責決定商業價值排序。"} ] },
                    { question: "敏捷開發 (Agile) 為什麼在軟體工程中比在硬體工程中更容易成功落地？", options: [ {title: "因為軟體工程師技術較強", correct: false, feedback: "錯誤。這與工程師的技術能力無關。"}, {title: "因為軟體程式碼的修改成本極低，允許快速迭代試錯", correct: true, feedback: "正確。軟體不需開模且沒有零件交期，隨時可以修改架構以回應市場變更。"}, {title: "因為軟體開發不需要 QA 測試", correct: false, feedback: "錯誤。軟體開發同樣極度重視自動化測試與驗證。"} ] },
                    { question: "每一個 Sprint (衝刺期) 結束時，團隊必須產出什麼？", options: [ {title: "厚重的系統規格書", correct: false, feedback: "錯誤。敏捷強調可用的軟體重於詳盡文件。"}, {title: "潛在可發布的產品增量 (Increment)", correct: true, feedback: "正確。每個 Sprint 的產出都必須是可獨立運作、隨時能上線的軟體版本。"}, {title: "下一季的行銷計畫", correct: false, feedback: "錯誤。這是 PM 或行銷單位的職責，非 Sprint 的開發產出。"} ] },
                    { question: "User Story (使用者故事) 的核心描述結構通常包含哪三個元素？", options: [ {title: "角色、需求、商業價值", correct: true, feedback: "正確。標準格式為：「身為 [角色]，我想要 [需求]，以便於 [商業價值]」。"}, {title: "資料庫、API、前端畫面", correct: false, feedback: "錯誤。這是技術規格，不是使用者故事。"}, {title: "成本、時程、風險", correct: false, feedback: "錯誤。這是傳統專案管理的鐵三角。"} ] },
                    { question: "當開發過程中發現這週絕對做不完承諾的 User Story 時，PO 通常會採取什麼戰術？", options: [ {title: "強迫工程師加班直到做完", correct: false, feedback: "錯誤。敏捷強調可持續的開發步調 (Sustainable pace)。"}, {title: "進行範圍裁切 (Scope cut)，保住最核心的商業價值 MVP", correct: true, feedback: "正確。PO 擁有戰術決策權，透過砍掉邊角功能來確保核心增量能如期交付。"}, {title: "直接取消整個 Sprint", correct: false, feedback: "錯誤。Sprint 取消是極端情況，通常僅在商業目標完全失效時發生。"} ] }
                ]
            },
            {
                title: "4. 硬體設計 Waterfall",
                desc: "瀑布式開發 (Waterfall) 是硬體領域的主流，特徵為嚴謹的線性流程與高度的相依性。",
                deepDive: [
                    "不同於軟體的敏捷彈性，硬體產品開發深受實體物理法則與全球供應鏈的制約。一個硬體專案必須經過嚴格的線性階段：需求分析 (Requirement)、系統架構 (Architecture)、細部設計 (Detailed Design)、工程試產 (EVT)、設計驗證 (DVT)、生產驗證 (PVT) 乃至最終量產 (MP)。每個階段的產出都是下一個階段的輸入，且極難逆向修改。",
                    "硬體的「變更成本」隨著階段推進呈現陡峭的指數型上升。在設計圖紙階段修改一顆電容或許只需幾分鐘；但若在模具開立 (Tooling) 甚至打件生產後才發現設計瑕疵，不僅幾百萬的模具報廢，更可能面臨數十週的零件交期 (Lead Time) 延遲，這對產品上市檔期是毀滅性的打擊。",
                    "因此，在 Waterfall 模型下的硬體 PL (專案負責人)，其決策基準高度偏向「可行性驅動 (Feasibility-driven)」。他們必須在前期規格定義時，極度謹慎地盤點最低訂購量 (MOQ)、第二料源 (Second Source) 與散熱安規等物理限制，並透過嚴謹的 V-Model 驗證架構，確保每一個硬體規格都能被穩定、高良率地製造出來。"
                ],
                points: [
                    { title: "線性且不可逆的流程", text: "從需求分析、系統設計、硬體實作、到各階段驗證（EVT、DVT、PVT）。一旦進入開模或打件階段，設計變更的代價極其高昂。" },
                    { title: "物理與供應鏈限制", text: "硬體開發深受物理世界的限制（如散熱、安規）以及供應鏈的制約（如零組件交期 Lead Time、起訂量 MOQ）。" },
                    { title: "驗證驅動", text: "與軟體的價值驅動不同，硬體在瀑布流的後期高度依賴嚴謹的可靠度測試與生產驗證，以確保進入量產後的良率。" }
                ],
                flipCards: [
                    { front: "EVT / DVT / PVT", back: "硬體驗證三階段：Engineering (工程/功能驗證)、Design (設計/安規驗證)、Production (生產/良率驗證)。" },
                    { front: "Lead Time (L/T)", back: "前置交期：從向供應商下達零組件訂單，到物料實際送達工廠產線所需等待的總時間。" },
                    { front: "MOQ", back: "最低訂購量 (Minimum Order Quantity)：供應商願意接受並啟動生產的最少零件購買數量，直接影響硬體庫存成本。" },
                    { front: "Tooling / NRE", back: "開模與非重覆性工程費用：硬體製造前期投入的模具開發、治具設計等一次性高昂成本。" },
                    { front: "Bill of Materials (BOM)", back: "物料清單：製造單一產品所需的所有零組件、原物料與其對應數量的精確明細表。" },
                    { front: "Yield Rate", back: "良率：工廠產線在生產過程中，製造出合格且無瑕疵產品的比例，為 PVT 階段的核心指標。" }
                ],
                quizBank: [
                    { question: "硬體開發通常遵循 EVT、DVT、PVT 的驗證流程，其中 DVT 的全名與主要目的為何？", options: [ {title: "Design Verification Test (設計驗證)：著重於安規認證、可靠度與環境測試", correct: true, feedback: "正確。DVT 階段必須確保產品設計符合所有外在規範與極端環境要求。"}, {title: "Development Visual Test (開發視覺測試)：確認產品顏色與外觀", correct: false, feedback: "錯誤。外觀通常在更早期的模型階段確認，並非 DVT 的核心嚴謹測試。"}, {title: "Data Validation Test (數據驗證)：測試資料庫存取速度", correct: false, feedback: "錯誤。這是軟體後端工程的測試範疇。"} ] },
                    { question: "為什麼硬體開發難以採用純粹的 Agile (敏捷) 模式在量產階段不斷修改規格？", options: [ {title: "因為硬體工程師不懂 Agile", correct: false, feedback: "錯誤。與個人知識無關，是產業物理特性決定方法論。"}, {title: "因為牽涉到開模 (Tooling) 與零件交期，變更成本極其高昂", correct: true, feedback: "正確。硬體一旦開模或下單特殊料件，事後修改將導致嚴重的金錢與時間損失。"}, {title: "因為硬體不需要進行測試", correct: false, feedback: "錯誤。硬體測試(EVT/DVT)比軟體更加曠日費時且嚴謹。"} ] },
                    { question: "在硬體供應鏈中，「Lead Time (L/T)」指的是什麼？", options: [ {title: "產品研發的總耗時", correct: false, feedback: "錯誤。這通常稱為 Time-to-Market。"}, {title: "從下單零件到實際到料所需的前置等待時間", correct: true, feedback: "正確。某些關鍵 IC 的交期甚至長達數十週，是硬體排程最大的風險來源。"}, {title: "產品開機到畫面出現的等待時間", correct: false, feedback: "錯誤。這是硬體效能指標，並非供應鏈術語。"} ] },
                    { question: "下列何者是硬體開發在前期規劃時，必須考量的重大供應鏈限制？", options: [ {title: "MOQ (最低訂購量)", correct: true, feedback: "正確。若產品預估銷量未達零件供應商的 MOQ，將面臨極高的庫存呆滯風險。"}, {title: "伺服器 AWS 的月租費", correct: false, feedback: "錯誤。這是軟體雲端營運成本。"}, {title: "程式碼的版本控制系統", correct: false, feedback: "錯誤。這是軟體工程的管理工具。"} ] },
                    { question: "在 V-Model 瀑布式開發中，左側的下降階段代表什麼意義？", options: [ {title: "系統需求與規格的逐步拆解、細化", correct: true, feedback: "正確。V-Model 左側為從高階需求展開至細部硬體/軟體設計的過程。"}, {title: "各階段的組裝與驗收測試", correct: false, feedback: "錯誤。這是 V-Model 右側上升階段的任務。"}, {title: "產品獲利的衰退曲線", correct: false, feedback: "錯誤。V-Model 與產品生命週期的獲利曲線無關。"} ] },

    // Global tracking across sessions (State only, resets on reload)
    const [globalQuizHistory, setGlobalQuizHistory] = useState({}); 
    const [globalFlipHistory, setGlobalFlipHistory] = useState({}); 
    
    // Export Form State
    const [exportData, setExportData] = useState({ group: 'G1', studentId: '', name: '' });
    // Active Scenario in Lab
    const [labScenarioIdx, setLabScenarioIdx] = useState(0);

    // Global Time and Click Tracking
    const [moduleTimes, setModuleTimes] = useState({});
    const [moduleClicks, setModuleClicks] = useState({});
    const [totalClicks, setTotalClicks] = useState(0);

    // Pools for Round-Robin
    const quizPoolsRef = useRef({});
    const flipPoolsRef = useRef({});

    const contentRef = useRef(null);
    const menuRef = useRef(null);

    const t = contentData[lang];
    const m = t.modules[module];

    // Helper: Round-Robin Pool Drawer
    const drawFromRefPool = (poolRef, modIdx, count, maxVal) => {
        let pool = poolRef.current[modIdx] ? [...poolRef.current[modIdx]] : [];
        let drawn = [];
        while (drawn.length < count) {
            if (pool.length === 0) {
                // Refill and shuffle
                let arr = Array.from({length: maxVal}, (_, i) => i);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                pool = arr;
            }
            drawn.push(pool.pop());
        }
        poolRef.current[modIdx] = pool;
        return drawn;
    };

    // Tracking Timer
    useEffect(() => {
        const timer = setInterval(() => {
            setModuleTimes(prev => ({
                ...prev,
                [module]: (prev[module] || 0) + 1
            }));
        }, 1000);
        return () => clearInterval(timer);
    }, [module]);

    // Tracking Clicks
    const handleGlobalClick = () => {
        setTotalClicks(c => c + 1);
        setModuleClicks(prev => ({
            ...prev,
            [module]: (prev[module] || 0) + 1
        }));
    };

    useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [theme]);

    useEffect(() => {
        const handleClickOutside = (event) => {
            if (menuRef.current && !menuRef.current.contains(event.target)) {
                setIsMobileMenuOpen(false);
            }
        };
        if (isMobileMenuOpen) document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
    }, [isMobileMenuOpen]);

    const scrollToTop = () => {
        if (contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    useEffect(() => {
        setVisited(prev => {
            const next = [...prev];
            next[module] = true;
            return next;
        });
        scrollToTop();
        stopTTS();

        if (module >= 1 && module <= 6 && t.modules[module].quizBank && t.modules[module].flipCards) {
            // Draw fresh for round-robin
            setQuizIndices(drawFromRefPool(quizPoolsRef, module, 2, 6));
            setFlipIndices(drawFromRefPool(flipPoolsRef, module, 2, 6));
            setQuizAnswers({});
        } else {
            setQuizIndices([]);
            setFlipIndices([]);
            setQuizAnswers({});
        }

        if (module !== 7) setLabScenarioIdx(0);
    }, [module]);

    const loadNextQuizzes = () => {
        setQuizIndices(drawFromRefPool(quizPoolsRef, module, 2, 6));
        setQuizAnswers({});
    };

    const loadNextFlips = () => {
        setFlipIndices(drawFromRefPool(flipPoolsRef, module, 2, 6));
    };

    const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');
    const toggleLang = () => { stopTTS(); setLang(lang === 'zh' ? 'en' : 'zh'); };

    // Handlers to track flip and quiz completion
    const handleQuizSelection = (qIdx, oIdx, isCorrect) => {
        setQuizAnswers(prev => ({...prev, [qIdx]: oIdx}));
        setGlobalQuizHistory(prev => {
            const modHistory = prev[module] || {};
            if (modHistory[qIdx] === undefined) {
                return { ...prev, [module]: { ...modHistory, [qIdx]: isCorrect } };
            }
            return prev;
        });
    };

    const handleFlipView = (cIdx) => {
        setGlobalFlipHistory(prev => {
            const modArr = prev[module] || [];
            if (!modArr.includes(cIdx)) {
                return { ...prev, [module]: [...modArr, cIdx] };
            }
            return prev;
        });
    };

    const handleExportCSV = () => {
        if(!exportData.group || !exportData.studentId || !exportData.name) {
            alert(t.export_alert);
            return;
        }
        const date = new Date();
        const dateStr = date.getFullYear() + String(date.getMonth() + 1).padStart(2, '0') + String(date.getDate()).padStart(2, '0');
        const filename = `${t.brand}_${exportData.group}_${exportData.name}_${dateStr}.csv`;

        let csvContent = "\uFEFF"; // UTF-8 BOM
        csvContent += (lang === 'zh' ? "組別,學號,姓名,日期\n" : "Group,Student ID,Name,Date\n");
        csvContent += `${exportData.group},${exportData.studentId},${exportData.name},${dateStr}\n\n`;

        const totalTime = Object.values(moduleTimes).reduce((a,b)=>a+b, 0);
        let totalQ = 0, totalA = 0, totalC = 0;
        for(let i=1; i<=6; i++) {
            const bank = t.modules[i].quizBank;
            const hist = globalQuizHistory[i] || {};
            totalQ += bank ? bank.length : 0;
            totalA += Object.keys(hist).length;
            totalC += Object.values(hist).filter(v=>v).length;
        }
        const totalAcc = totalA > 0 ? Math.round((totalC/totalA)*100) : 0;

        csvContent += (lang === 'zh' ? "總學習時間(s),總互動數,總答題正確率\n" : "Total Time(s),Total Clicks,Total Accuracy\n");
        csvContent += `${totalTime},${totalClicks},${totalAcc}%\n\n`;

        csvContent += (lang === 'zh' ? "模組,時間(s),互動次數,答對,已答,總題數\n" : "Module,Time(s),Clicks,Correct,Answered,Total\n");

        for(let i=1; i<=6; i++) {
            const bank = t.modules[i].quizBank;
            const hist = globalQuizHistory[i] || {};
            const tQ = bank ? bank.length : 0;
            const tA = Object.keys(hist).length;
            const tC = Object.values(hist).filter(v=>v).length;
            const tTime = moduleTimes[i] || 0;
            const tClicks = moduleClicks[i] || 0;
            csvContent += `"${t.modules[i].title}",${tTime},${tClicks},${tC},${tA},${tQ}\n`;
        }

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // --- Web Speech API (TTS) ---
    const getPreferredVoice = (langCode) => {
        const voices = window.speechSynthesis.getVoices();
        if (langCode === 'zh') {
            return voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Yating') || v.name.includes('Ya-Ting') || v.name.includes('Hsiao') || v.name.includes('Mei-Jia'))) ||
                   voices.find(v => v.lang === 'zh-TW') ||
                   voices.find(v => v.lang.includes('zh'));
        } else {
            return voices.find(v => v.lang === 'en-GB' && (v.name.includes('Male') || v.name.includes('George') || v.name.includes('Brian'))) ||
                   voices.find(v => v.lang === 'en-GB') ||
                   voices.find(v => v.lang.includes('en'));
        }
    };

    const generateFullText = (mod) => {
        let parts = [mod.title, mod.desc];
        if (mod.content) parts.push(mod.content);
        if (mod.deepDive) mod.deepDive.forEach(p => parts.push(p));
        if (mod.points) mod.points.forEach((p, i) => parts.push(`第${i+1}點：${p.title}。${p.text}`));
        if (mod.table) {
            parts.push(lang === 'zh' ? '表格重點整理：' : 'Table Summary:');
            mod.table.rows.forEach(r => {
                const k = r.level || r.stage;
                const v = r.role || r.comp;
                const s = r.scope || r.domain;
                parts.push(`${k}，負責角色為${v}。涵蓋範疇：${s}。`);
            });
        }
        if (mod.equation) parts.push(`${mod.equation.left} 等同於 ${mod.equation.right1} 加上 ${mod.equation.right2}`);
        if (mod.nodes) mod.nodes.forEach(n => parts.push(`${n.title}。${n.desc}`));
        if (mod.comparisons) mod.comparisons.forEach(c => parts.push(`${c.type}，主要考量為${c.focus}。${c.detail}`));
        if (mod.quote) parts.push(`總結論點：${mod.quote}`);
        
        if (mod.flipCards && flipIndices.length > 0) {
            parts.push(lang === 'zh' ? '關鍵專有名詞：' : 'Key Terminology:');
            flipIndices.forEach(idx => {
                const c = mod.flipCards[idx];
                parts.push(`${c.front}。定義：${c.back}`);
            });
        }

        if (mod.quizBank && quizIndices.length > 0) {
            parts.push(lang === 'zh' ? '隨機知識檢定：' : 'Random Knowledge Check:');
            const qModHist = globalQuizHistory[module] || {};
            const qAnswered = Object.keys(qModHist).length;
            const qCorrect = Object.values(qModHist).filter(v=>v).length;
            const qTotal = mod.quizBank.length;
            if (lang === 'zh') {
                parts.push(`目前測驗得分：答對 ${qCorrect} 題，已答 ${qAnswered} 題，共 ${qTotal} 題。`);
            } else {
                parts.push(`Current Score: ${qCorrect} correct, ${qAnswered} answered, out of ${qTotal} total.`);
            }

            quizIndices.forEach((qIdx, i) => {
                const q = mod.quizBank[qIdx];
                parts.push(`第${i+1}題：${q.question}`);
                q.options.forEach((o, j) => parts.push(`選項 ${String.fromCharCode(65+j)}：${o.title}。`));
            });
        }

        if (mod.scenarios) {
            const currentScenario = mod.scenarios[labScenarioIdx];
            parts.push(lang === 'zh' ? `互動實驗室情境模擬：${currentScenario.name}` : `Interactive Lab Scenario: ${currentScenario.name}`);
            currentScenario.steps.forEach((s, idx) => {
                parts.push(`階段 ${idx+1}：${s.context}`);
                if (s.question) parts.push(`問題：${s.question}`);
                if (s.options) {
                    s.options.forEach((o, i) => parts.push(`選項 ${String.fromCharCode(65+i)}：${o.title}。`));
                }
                if (s.success) parts.push(`結論：${s.success}`);
            });
        }

        if (mod.links) {
            parts.push(lang === 'zh' ? '推薦外部資源：' : 'External Resources:');
            mod.links.forEach(l => parts.push(`${l.title}。${l.desc}`));
        }
        
        if (module === 9) {
            const totalTime = Object.values(moduleTimes).reduce((a,b)=>a+b, 0);
            let totalQ = 0, totalA = 0, totalC = 0;
            for(let i=1; i<=6; i++) {
                const bank = t.modules[i].quizBank;
                const hist = globalQuizHistory[i] || {};
                totalQ += bank ? bank.length : 0;
                totalA += Object.keys(hist).length;
                totalC += Object.values(hist).filter(v=>v).length;
            }
            const totalAcc = totalA > 0 ? Math.round((totalC/totalA)*100) : 0;

            parts.push(lang === 'zh' 
                ? `動態成績儀表板。總學習時間 ${totalTime} 秒，總互動點擊 ${totalClicks} 次，總答題正確率 ${totalAcc}%。` 
                : `Dynamic Dashboard. Total Learning Time ${totalTime} seconds, Total Interactions ${totalClicks}, Overall Accuracy ${totalAcc}%.`);
            
            for(let i=1; i<=6; i++) {
                const bank = t.modules[i].quizBank;
                const hist = globalQuizHistory[i] || {};
                const tQ = bank ? bank.length : 0;
                const tA = Object.keys(hist).length;
                const tC = Object.values(hist).filter(v=>v).length;
                const tTime = moduleTimes[i] || 0;
                const tClicks = moduleClicks[i] || 0;
                parts.push(lang === 'zh' 
                    ? `${t.modules[i].title}：時間 ${tTime} 秒，互動 ${tClicks} 次，答對 ${tC} 題，已答 ${tA} 題，共 ${tQ} 題。` 
                    : `${t.modules[i].title}: Time ${tTime} seconds, Clicks ${tClicks}, ${tC} correct out of ${tA} answered, total ${tQ}.`);
            }
            parts.push(lang === 'zh' ? `請填寫您的組別、學號與姓名後，點擊匯出 CSV 學習紀錄。` : `Please fill in your Group, Student ID, and Name to export the CSV record.`);
        }

        return parts.join(' ');
    };

    const handleTtsEnd = () => setTtsState('idle');

    const playPauseTTS = () => {
        if (!('speechSynthesis' in window)) {
            alert(lang === 'zh' ? '您的瀏覽器不支援語音導覽功能。' : 'Your browser does not support Speech Synthesis.');
            return;
        }
        
        if (ttsState === 'playing') {
            window.speechSynthesis.pause();
            setTtsState('paused');
        } else if (ttsState === 'paused') {
            window.speechSynthesis.resume();
            setTtsState('playing');
        } else {
            window.speechSynthesis.cancel();
            const text = generateFullText(m);
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = getPreferredVoice(lang);
            utterance.lang = lang === 'zh' ? 'zh-TW' : 'en-GB';
            utterance.rate = 1.0;
            utterance.onend = handleTtsEnd;
            utterance.onerror = handleTtsEnd;
            window.speechSynthesis.speak(utterance);
            setTtsState('playing');
        }
    };

    const stopTTS = () => {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        setTtsState('idle');
    };

    // --- Reusable Component Renderers ---
    const renderDeepDive = (paragraphs) => {
        if (!paragraphs) return null;
        return (
            <div className="space-y-4 mb-8">
                {paragraphs.map((p, idx) => (
                    <p key={idx} className="text-base text-slate-700 dark:text-slate-300 leading-loose text-justify">
                        {p}
                    </p>
                ))}
            </div>
        );
    };

    const renderFlipCards = (cards) => {
        if (!cards || flipIndices.length === 0) return null;
        const viewedCount = (globalFlipHistory[module] || []).length;
        const flipScoreText = t.flip_score.replace('{viewed}', viewedCount).replace('{total}', cards.length);

        return (
            <div className="mt-12 bg-white dark:bg-slate-800 p-5 sm:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-slate-200 dark:border-slate-700 pb-3">
                    <div className="flex items-center gap-2">
                        <Icon name="layers" size={24} className="text-[#004030] dark:text-[#D8C3A5]" />
                        <h3 className="text-xl font-bold text-[#004030] dark:text-[#D8C3A5]">{t.flip_title}</h3>
                    </div>
                    <div className="text-sm font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700/50 px-3 py-1.5 rounded-full shrink-0 text-center">
                        {flipScoreText}
                    </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 perspective">
                    {flipIndices.map((cIdx, idx) => {
                        const card = cards[cIdx];
                        return (
                            <div key={idx} className="flip-card h-56 group cursor-pointer relative" onClick={() => handleFlipView(cIdx)}>
                                <div className="flip-card-inner relative w-full h-full shadow-sm rounded-2xl border border-slate-200 dark:border-slate-600">
                                    <div className="absolute w-full h-full backface-hidden bg-slate-50 dark:bg-slate-700/30 rounded-2xl flex flex-col items-center justify-center p-4 sm:p-6 text-center">
                                        <h4 className="text-xl font-bold text-[#004030] dark:text-[#D8C3A5] break-words mb-2">{card.front}</h4>
                                        <Icon name="play" size={16} className="mt-2 text-slate-400 animate-bounce" />
                                    </div>
                                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-[#004030] dark:bg-slate-900 rounded-2xl border border-[#D8C3A5] flex flex-col items-center justify-center p-4 sm:p-6 text-center text-white">
                                        <p className="text-sm sm:text-base leading-relaxed break-words">{card.back}</p>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
                <div className="mt-8 pt-4 border-t border-slate-100 dark:border-slate-700 flex justify-end">
                    <button 
                        onClick={loadNextFlips} 
                        className="w-full sm:w-auto px-6 py-3 bg-slate-100 dark:bg-slate-700/50 hover:bg-[#D8C3A5]/20 dark:hover:bg-slate-700 text-[#004030] dark:text-[#D8C3A5] rounded-xl text-sm font-bold shadow-sm transition-colors border border-slate-200 dark:border-slate-600 flex items-center justify-center gap-2 uppercase tracking-wider"
                    >
                        <Icon name="refresh" size={16} />
                        {t.next_cards}
                    </button>
                </div>
            </div>
        );
    };

    const renderRandomQuiz = (bank) => {
        if (!bank || quizIndices.length === 0) return null;
        
        const qModHist = globalQuizHistory[module] || {};
        const qAnswered = Object.keys(qModHist).length;
        const qCorrect = Object.values(qModHist).filter(v=>v).length;
        const quizScoreText = t.quiz_score.replace('{correct}', qCorrect).replace('{answered}', qAnswered).replace('{total}', bank.length);

        return (
            <div className="mt-12 bg-[#004030]/5 dark:bg-slate-800/40 p-5 sm:p-8 rounded-2xl border border-[#004030]/10 dark:border-slate-700">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-[#004030]/10 dark:border-slate-700 pb-3">
                    <div className="flex items-center gap-2">
                        <Icon name="flask" size={24} className="text-[#004030] dark:text-[#D8C3A5]" />
                        <h3 className="text-xl font-bold text-[#004030] dark:text-[#D8C3A5]">{t.quiz_title}</h3>
                    </div>
                    <div className="text-sm font-bold text-emerald-700 dark:text-emerald-400 bg-emerald-100/50 dark:bg-emerald-900/30 px-3 py-1.5 rounded-full shrink-0 text-center">
                        {quizScoreText}
                    </div>
                </div>
                <div className="space-y-8">
                    {quizIndices.map((qIdx, idx) => {
                        const q = bank[qIdx];
                        const selectedOption = quizAnswers[qIdx];
                        return (
                            <div key={qIdx} className="space-y-4 bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                                <h4 className="text-lg font-bold text-slate-800 dark:text-slate-200 leading-relaxed">
                                    Q{idx + 1}. {q.question}
                                </h4>
                                <div className="grid gap-3">
                                    {q.options.map((opt, oIdx) => (
                                        <button
                                            key={oIdx}
                                            onClick={() => handleQuizSelection(qIdx, oIdx, opt.correct)}
                                            className={`p-4 text-left rounded-xl border-2 transition-all duration-300 ${
                                                selectedOption === oIdx 
                                                ? (opt.correct 
                                                    ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30' 
                                                    : 'border-rose-500 bg-rose-50 dark:bg-rose-900/30') 
                                                : 'border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 hover:border-[#D8C3A5] hover:bg-white dark:hover:bg-slate-800'
                                            }`}
                                        >
                                            <div className="font-bold text-slate-700 dark:text-slate-300 flex items-center justify-between">
                                                <span>{String.fromCharCode(65+oIdx)}. {opt.title}</span>
                                                {selectedOption === oIdx && (
                                                    <Icon name={opt.correct ? "checkCircle" : "x"} className={`shrink-0 ml-2 ${opt.correct ? "text-emerald-500" : "text-rose-500"}`} />
                                                )}
                                            </div>
                                            {selectedOption === oIdx && (
                                                <div className={`text-sm mt-3 pt-3 border-t ${opt.correct ? 'border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300' : 'border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-300'} animate-fade-in`}>
                                                    {opt.feedback}
                                                </div>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
                <div className="mt-8 pt-4 border-t border-[#004030]/10 dark:border-slate-700 flex justify-end">
                    <button 
                        onClick={loadNextQuizzes} 
                        className="w-full sm:w-auto px-6 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-[#D8C3A5] dark:text-[#004030] rounded-xl text-sm font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors flex items-center justify-center gap-2 uppercase tracking-wider"
                    >
                        <Icon name="refresh" size={16} />
                        {t.next_quizzes}
                    </button>
                </div>
            </div>
        );
    };

    // --- Content Page Renderers ---
    const renderExec = () => (
        <div className="animate-fade-in space-y-6">
            <p className="text-lg md:text-xl text-slate-600 dark:text-slate-300 font-medium leading-relaxed">{m.desc}</p>
            <div className="bg-[#D8C3A5]/20 dark:bg-slate-800 p-6 md:p-8 rounded-2xl border-l-4 border-[#004030] dark:border-[#D8C3A5] shadow-sm">
                <p className="text-base text-slate-700 dark:text-slate-300 leading-loose text-justify">{m.content}</p>
            </div>
            
            <div className="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700">
                <h3 className="text-xl font-bold text-[#004030] dark:text-[#D8C3A5] mb-4 flex items-center gap-2">
                    <Icon name="layers" size={24} />
                    {lang === 'zh' ? '主題分頁 1-6' : 'Theme Modules 1-6'}
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4">
                    {t.nav.slice(1, 7).map((item, idx) => (
                        <button 
                            key={item.id}
                            onClick={() => { setModule(idx + 1); scrollToTop(); }}
                            className="flex items-center p-3 sm:p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left group"
                        >
                            <div className="bg-[#004030]/10 dark:bg-slate-700 p-2 rounded-lg mr-3 group-hover:bg-[#004030] group-hover:text-[#D8C3A5] transition-colors text-[#004030] dark:text-[#D8C3A5] shrink-0">
                                <Icon name={item.icon} size={20} />
                            </div>
                            <span className="font-bold text-sm text-slate-700 dark:text-slate-200 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] line-clamp-2">{item.title}</span>

    // Module 7: Interactive Lab (Split Pane Case Study with Multi-Scenarios)
    const InteractiveLab = () => {
        const [labStep, setLabStep] = useState(0);
        const [labSelected, setLabSelected] = useState(null);

        useEffect(() => { setLabStep(0); setLabSelected(null); stopTTS(); }, [labScenarioIdx, lang]);

        const currentScenario = m.scenarios[labScenarioIdx];
        const steps = currentScenario.steps;
        const currentData = steps[labStep];
        const isLastStep = labStep === steps.length - 1;

        const handleOptionClick = (oIdx, opt) => {
            setLabSelected(oIdx);
            if (opt.correct) {
                setTimeout(() => {
                    setLabStep(prev => prev + 1);
                    setLabSelected(null);
                }, 3000);
            }
        };

        const resetLab = () => {
            setLabStep(0);
            setLabSelected(null);
        };

        return (
            <div className="animate-fade-in space-y-6 w-full max-w-full">
                <p className="text-lg text-slate-600 dark:text-slate-300 font-medium">{m.desc}</p>
                
                {/* Scenario Selector */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                    {m.scenarios.map((sc, idx) => (
                        <button 
                            key={idx}
                            onClick={() => setLabScenarioIdx(idx)}
                            className={`p-3 rounded-xl border-2 text-sm font-bold transition-all shadow-sm ${
                                labScenarioIdx === idx 
                                ? 'border-[#004030] bg-[#004030] text-[#D8C3A5] dark:border-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030]' 
                                : 'border-slate-200 bg-white text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 hover:border-[#D8C3A5]'
                            }`}
                        >
                            {sc.name}
                        </button>
                    ))}
                </div>

                {/* Progress Bar for Lab */}
                <div className="flex gap-2 mb-4">
                    {steps.map((_, i) => (
                        <div key={i} className={`h-2 flex-1 rounded-full transition-all duration-500 ${i <= labStep ? 'bg-[#004030] dark:bg-[#D8C3A5]' : 'bg-slate-200 dark:bg-slate-700'}`}></div>
                    ))}
                </div>

                <div className="flex flex-col lg:flex-row gap-6">
                    {/* Left: Context */}
                    <div className="lg:w-2/5 bg-[#004030] text-[#D8C3A5] p-6 md:p-8 rounded-2xl shadow-sm h-full min-h-[300px]">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2 border-b border-[#D8C3A5]/30 pb-3">
                            <Icon name="flask" size={24} />
                            {lang === 'zh' ? '情境與條件' : 'Scenario Context'}
                        </h3>
                        <p className="text-base md:text-lg leading-loose text-justify">
                            {currentData.context}
                        </p>
                    </div>
                    
                    {/* Right: Question & Options */}
                    <div className="lg:w-3/5 bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-center min-h-[300px]">
                        {currentData.question && (
                            <h4 className="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-200 mb-6 leading-relaxed">
                                {currentData.question}
                            </h4>
                        )}

                        {currentData.options && currentData.options.length > 0 ? (
                            <div className="grid gap-4">
                                {currentData.options.map((opt, i) => (
                                    <button
                                        key={i}
                                        onClick={() => handleOptionClick(i, opt)}
                                        disabled={labSelected !== null && currentData.options[labSelected].correct}
                                        className={`p-4 sm:p-5 text-left rounded-xl border-2 transition-all duration-300 shadow-sm ${
                                            labSelected === i 
                                            ? (opt.correct 
                                                ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30' 
                                                : 'border-rose-500 bg-rose-50 dark:bg-rose-900/30') 
                                            : 'border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/50 hover:border-[#D8C3A5] hover:shadow-md'
                                        }`}
                                    >
                                        <div className="font-bold text-slate-800 dark:text-slate-200 flex items-center justify-between">
                                            {opt.title}
                                            {labSelected === i && (
                                                <Icon name={opt.correct ? "checkCircle" : "x"} className={`shrink-0 ml-2 ${opt.correct ? "text-emerald-500" : "text-rose-500"}`} />
                                            )}
                                        </div>
                                        {labSelected === i && (
                                            <div className={`text-sm mt-3 pt-3 border-t ${opt.correct ? 'border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300' : 'border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-300'} animate-fade-in`}>
                                                {opt.feedback}

                                    {lang === 'zh' ? '重新體驗實驗室' : 'Restart Lab'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    };

                                        <th className="p-3 text-sm font-bold text-center text-slate-600 dark:text-slate-400">{t.col_time}</th>
                                        <th className="p-3 text-sm font-bold text-center text-slate-600 dark:text-slate-400">{t.col_clicks}</th>

                                </thead>

                                        const hist = globalQuizHistory[modIdx] || {};

                                    onChange={handleInputChange}
                                    placeholder="Jimmy Lo" 
                                    className="w-full p-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-white placeholder-slate-300 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-[#D8C3A5]"
                                />
                            </div>
                        </div>
                        <button 
                            onClick={handleExportCSV}
                            className="mt-6 w-full px-6 py-4 bg-[#004030] dark:bg-[#D8C3A5] text-[#D8C3A5] dark:text-[#004030] rounded-xl font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors flex items-center justify-center gap-2 uppercase tracking-wider shrink-0"
                        >
                            <Icon name="download" size={18} />
                            {t.export_btn}
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const renderContent = () => {
        switch(module) {
            case 0: return renderExec();
            case 1: return renderNPD();
            case 2: return renderPMComp();
            case 3: return renderFrameworks();
            case 4: return renderFrameworks();
            case 5: return renderSynRoles();
            case 6: return renderSynDrivers();
            case 7: return <InteractiveLab />;
            case 8: return <ExternalResources />;
            case 9: return <LearningJourney />;
            default: return renderExec();
        }
    };

    return (
        <div className="min-h-screen flex flex-col pt-16 pb-12 font-sans bg-slate-50 dark:bg-slate-900 relative" onClickCapture={handleGlobalClick}>
            {/* Header - Fixed & Never Moving */}
            <header className="fixed top-0 left-0 right-0 h-16 z-50 bg-[#004030] shadow-md border-b border-[#D8C3A5]">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
                    {/* Left: Brand + Title mapped to scroll to top */}
                    <div className="flex items-center min-w-0 flex-1">
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden p-2 -ml-2 rounded-md text-[#D8C3A5] hover:bg-white/10 mr-2 focus:outline-none shrink-0">
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} size={24} />
                        </button>
                        <div className="flex items-baseline cursor-pointer truncate hover:opacity-80 transition-opacity" onClick={scrollToTop} title={lang === 'zh' ? '回到頂端' : 'Scroll to Top'}>
                            <span className="font-serif font-black text-xl text-[#D8C3A5] tracking-widest shrink-0">{t.brand}</span>
                            <span className="ml-3 text-[#D8C3A5]/90 font-bold text-sm sm:text-base truncate hidden sm:inline">{t.headerTitle}</span>
                        </div>
                    </div>
                    
                    {/* Right: TTS + Global Toggles */}
                    <div className="flex items-center space-x-1 sm:space-x-3 shrink-0 pl-2">
                        {/* Audio Guide Controls */}
                        <div className="flex items-center space-x-1 mr-1">
                            <button 
                                onClick={playPauseTTS} 
                                className={`flex items-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-2.5 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all shadow-sm border ${ttsState === 'playing' ? 'bg-[#D8C3A5]/20 text-[#D8C3A5] border-[#D8C3A5]/50' : 'bg-white/10 text-[#D8C3A5] border-[#D8C3A5]/30 hover:bg-white/20'}`}
                                title={ttsState === 'playing' ? t.audio_pause : ttsState === 'paused' ? t.audio_resume : t.audio_play}
                            >
                                <Icon name={ttsState === 'playing' ? 'pause' : 'play'} size={14} />
                                <span className="hidden lg:inline">
                                    {ttsState === 'playing' ? t.audio_pause : ttsState === 'paused' ? t.audio_resume : t.audio_play}
                                </span>
                            </button>
                            {ttsState !== 'idle' && (
                                <button 
                                    onClick={stopTTS} 
                                    className="flex items-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-2.5 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all shadow-sm border bg-rose-500/20 text-rose-300 border-rose-500/50 hover:bg-rose-500/40"
                                    title={t.audio_stop}
                                >
                                    <Icon name="stop" size={14} />
                                    <span className="hidden lg:inline">{t.audio_stop}</span>
                                </button>
                            )}
                        </div>

                        <button onClick={toggleLang} className="flex items-center px-2 sm:px-3 py-1.5 rounded-full bg-white/10 text-[#D8C3A5] hover:bg-white/20 transition-colors text-xs sm:text-sm font-medium border border-[#D8C3A5]/30">
                            <Icon name="globe" size={14} className="sm:mr-1.5" />
                            <span className="hidden sm:inline">{lang === 'zh' ? 'EN' : '中'}</span>
                        </button>
                        <button onClick={toggleTheme} className="p-1.5 sm:p-2 rounded-full text-[#D8C3A5] hover:bg-white/10 transition-colors border border-transparent hover:border-[#D8C3A5]/30">
                            <Icon name={theme === 'dark' ? "sun" : "moon"} size={18} />
                        </button>
                    </div>
                </div>
            </header>

            {/* Main Application Area */}
            <div className="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto relative h-full">
                
                {/* Mobile Dropdown Menu */}
                {isMobileMenuOpen && (
                    <div className="md:hidden fixed inset-0 z-[90] bg-black/50" onClick={() => setIsMobileMenuOpen(false)}></div>
                )}
                <div 
                    ref={menuRef}
                    className={`md:hidden fixed top-16 left-0 right-0 bg-white dark:bg-slate-800 z-[100] shadow-xl border-b border-slate-200 dark:border-slate-700 transition-all duration-300 max-h-[calc(100vh-7rem)] overflow-y-auto origin-top ${isMobileMenuOpen ? 'scale-y-100 opacity-100' : 'scale-y-0 opacity-0 pointer-events-none'}`}
                >
                    <nav className="p-4 space-y-2">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => { setModule(idx); setIsMobileMenuOpen(false); }}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-colors ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030]' 
                                        : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span>{item.title}</span>
                                </button>
                            );
                        })}
                    </nav>
                </div>

                {/* Desktop Sidebar Navigation */}
                <aside className="hidden md:block w-72 shrink-0 p-4 lg:p-6 sticky top-16 h-[calc(100vh-7rem)] overflow-y-auto">
                    <nav className="space-y-1">
                        {t.nav.map((item, idx) => {
                            const isActive = module === idx;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setModule(idx)}
                                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 ${
                                        isActive 
                                        ? 'bg-[#004030] text-[#D8C3A5] dark:bg-[#D8C3A5] dark:text-[#004030] shadow-md' 
                                        : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#004030] dark:hover:text-white'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className={`mr-3 shrink-0 ${isActive ? 'opacity-100' : 'opacity-70'} ${visited[idx] && !isActive ? 'text-emerald-500' : ''}`} />
                                    <span className="truncate text-left">{item.title}</span>
                                    {isActive && <Icon name="chevronRight" size={16} className="ml-auto opacity-70 shrink-0" />}
                                </button>
                            );
                        })}
                    </nav>
                </aside>

                {/* Main Content Area */}
                <main ref={contentRef} className="flex-1 min-w-0 p-4 sm:p-6 md:p-8 scroll-smooth overflow-y-auto h-[calc(100vh-7rem)]">
                    
                    {/* Header Text for the Page */}
                    <div className="mb-6 md:mb-8 pb-4 border-b border-slate-200 dark:border-slate-700">
                        <h1 className="text-2xl md:text-3xl lg:text-4xl font-bold text-slate-900 dark:text-white mb-2">{t.docTitle}</h1>
                        <p className="text-sm md:text-base text-slate-600 dark:text-slate-400">{t.subtitle}</p>
                    </div>

                    {/* Content Card */}
                    <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8 relative min-h-full flex flex-col">
                        <h2 className="text-xl md:text-2xl font-bold mb-6 text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] inline-block pb-2 pr-4 shrink-0">{m.title}</h2>
                        
                        <div className="flex-1">
                            {renderContent()}
                        </div>
                        
                        {/* Footer Navigation (Next/Prev Buttons) */}
                        <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <button 
                                onClick={() => setModule(Math.max(0, module - 1))} 
                                disabled={module === 0} 
                                className="px-4 sm:px-6 py-2.5 text-slate-600 dark:text-[#D8C3A5] border border-slate-200 dark:border-[#D8C3A5]/30 hover:bg-slate-50 dark:hover:bg-[#D8C3A5]/10 rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider flex items-center transition-colors"
                            >
                                ← {t.nav_prev}
                            </button>
                            <button 
                                onClick={() => setModule(Math.min(TOTAL_MODULES - 1, module + 1))} 
                                disabled={module === TOTAL_MODULES - 1} 
                                className="px-5 sm:px-8 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-[#D8C3A5] dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white rounded-lg disabled:opacity-0 uppercase text-xs sm:text-sm tracking-wider shadow-md flex items-center transition-colors"
                            >
                                {t.nav_next} <Icon name="arrowRight" size={16} className="ml-2"/>
                            </button>
                        </div>
                    </div>
                </main>
            </div>

            {/* Application Footer - Fixed RWD */}
            <footer className="fixed bottom-0 left-0 right-0 h-12 bg-[#004030] dark:bg-slate-950 border-t border-[#D8C3A5] z-50">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center gap-2">
                    <div className="flex items-center gap-2 overflow-hidden shrink-0">
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs truncate max-w-[120px] sm:max-w-full">{t.web_version}: {t.date}</span>
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs hidden sm:inline">|</span>
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs truncate hidden sm:inline">{t.copyright}</span>
                    </div>
                    <div className="flex items-center gap-4 shrink-0">
                        <span className="text-[#D8C3A5]/80 text-[10px] sm:text-xs flex items-center gap-1 shrink-0">
                            Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors truncate">Prof. Shihmin Lo</a>
                        </span>
                        <button onClick={scrollToTop} className="text-[#D8C3A5] hover:text-white text-[10px] sm:text-xs font-bold flex items-center gap-1 uppercase tracking-wider transition-colors shrink-0 group border-l border-[#D8C3A5]/30 pl-4">
                            Top <Icon name="arrowUp" size={14} className="group-hover:-translate-y-0.5 transition-transform" />
                        </button>
                    </div>
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
